<!DOCTYPE html>
<html>
<head>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style>
.difficulty-bar {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    background: #eee;
    padding: 20px;
}

.diff-btn {
    padding: 6px 16px;
    border-radius: 30px;
    border: 2px solid #5c6bc0;
    background: transparent;
    color: #5c6bc0;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
}
/* Without margin-right: 5px to test gap */
.diff-btn.active {
    background: #5c6bc0;
    color: #fff;
}
</style>
</head>
<body>
    <div class="difficulty-bar">
        <button class="diff-btn active"><i class="fas fa-circle" style="color: #2ecc71;"></i> Facile</button>
        <button class="diff-btn"><i class="fas fa-circle" style="color: #f1c40f;"></i> Moyen</button>
        <button class="diff-btn"><i class="fas fa-circle" style="color: #e74c3c;"></i> Difficile</button>
        <button class="diff-btn"><i class="fas fa-fire" style="color: #e74c3c;"></i><i class="fas fa-fire" style="color: #e74c3c;"></i> Extrême</button>
    </div>
</body>
</html>
