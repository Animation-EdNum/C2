name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Detect which files changed ─────────────────────────────────────────────
  changes:
    name: "Detect changed files"
    runs-on: ubuntu-latest
    outputs:
      basic:         ${{ steps.filter.outputs.basic }}
      scores:        ${{ steps.filter.outputs.scores }}
      automate:      ${{ steps.filter.outputs.automate }}
      binaire_codage: ${{ steps.filter.outputs.binaire_codage }}
      alpha_webapps: ${{ steps.filter.outputs.alpha_webapps }}
    steps:
      - uses: actions/checkout@v4.1.6
      - uses: dorny/paths-filter@v3.0.2
        id: filter
        with:
          filters: |
            basic:
              - 'index.html'
              - 'assets/css/**'
              - 'assets/js/**'
            scores:
              - 'assets/js/**'
              - 'webapps/**'
            automate:
              - 'webapps/simulateur_automate.html'
              - 'assets/img/mats/**'
            webapps_binaire:
              - 'webapps/binaire_codage.html'
              - 'webapps/binaire_message.html'
              - 'webapps/binaire_studio.html'
            webapps_logic:
              - 'webapps/bit_de_parite.html'
              - 'webapps/routage_reseau.html'
            alpha_webapps:
              - 'alpha/webapps/**'

  # ── Basic & Resources ──────────────────────────────────────────────────────
  test-basic:
    name: "Basic & Resources"
    needs: changes
    if: needs.changes.outputs.basic == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.6
      - uses: actions/setup-python@v5.1.0
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install pytest-playwright playwright
          playwright install chromium
      - name: Start HTTP server
        run: python -m http.server 8000 &
      - name: Wait for server
        run: sleep 2
      - name: Run tests
        run: python -m pytest meta/tests/e2e/test_basic.py meta/tests/e2e/test_teacher.py meta/tests/e2e/test_confetti.py meta/tests/e2e/test_theme.py meta/tests/e2e/test_webapps.py -v

  # ── Scores ─────────────────────────────────────────────────────────────────
  test-scores:
    name: "Scores"
    needs: changes
    if: needs.changes.outputs.scores == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.6
      - uses: actions/setup-python@v5.1.0
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install pytest-playwright playwright
          playwright install chromium
      - name: Start HTTP server
        run: python -m http.server 8000 &
      - name: Wait for server
        run: sleep 2
      - name: Run tests
        run: python -m pytest meta/tests/e2e/test_scores.py -v

  # ── Automate Simulator ─────────────────────────────────────────────────────
  test-automate:
    name: "Automate Simulator"
    needs: changes
    if: needs.changes.outputs.automate == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.6
      - uses: actions/setup-python@v5.1.0
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install pytest-playwright playwright
          playwright install chromium
      - name: Start HTTP server
        run: python -m http.server 8000 &
      - name: Wait for server
        run: sleep 2
      - name: Run tests
        run: python -m pytest meta/tests/e2e/test_automate.py -v

  # ── Webapps Binaire ────────────────────────────────────────────────────────
  test-webapps-binaire:
    name: "Webapps Binaire"
    needs: changes
    if: needs.changes.outputs.webapps_binaire == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.6
      - uses: actions/setup-python@v5.1.0
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install pytest-playwright playwright
          playwright install chromium
      - name: Start HTTP server
        run: python -m http.server 8000 &
      - name: Wait for server
        run: sleep 2
      - name: Run tests
        run: python -m pytest meta/tests/e2e/test_binaire_codage.py meta/tests/e2e/test_binaire_message.py meta/tests/e2e/test_binaire_studio.py -v

  # ── Webapps Logic ──────────────────────────────────────────────────────────
  test-webapps-logic:
    name: "Webapps Logic"
    needs: changes
    if: needs.changes.outputs.webapps_logic == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.6
      - uses: actions/setup-python@v5.1.0
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install pytest-playwright playwright
          playwright install chromium
      - name: Start HTTP server
        run: python -m http.server 8000 &
      - name: Wait for server
        run: sleep 2
      - name: Run tests
        run: python -m pytest meta/tests/e2e/test_bit_de_parite.py meta/tests/e2e/test_routage_reseau.py -v

  # ── Alpha Webapps (pixels_binaires, pixel_studio_rvb, etc.) ───────────────
  test-alpha-webapps:
    name: "Alpha Webapps"
    needs: changes
    if: needs.changes.outputs.alpha_webapps == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.6
      - uses: actions/setup-python@v5.1.0
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install pytest-playwright playwright
          playwright install chromium
      - name: Start HTTP server
        run: python -m http.server 8000 &
      - name: Wait for server
        run: sleep 2
      - name: Run tests
        run: python -m pytest meta/tests/e2e/test_alpha_webapps.py -v
