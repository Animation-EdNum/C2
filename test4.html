<!DOCTYPE html>
<html>
<head>
<style>
  .bot-grid-container {
      height: auto;
      max-height: 60vh;
      max-width: min(100%, calc(60vh * (var(--grid-cols, 6) / var(--grid-rows, 6)))) !important;
  }
  .bot-grid {
      position: relative;
      display: flex;
      flex-direction: column;
      border: 3px solid black;
      border-radius: 8px;
      overflow: visible;
      background: white;
      width: 100%;
      height: 100%; /* I wonder if this fixes it */
      aspect-ratio: var(--grid-cols, 6) / var(--grid-rows, 6);
      margin: 0 auto;
  }
  .grid-row {
      display: flex;
      flex: 1;
      min-height: 0;
  }
</style>
</head>
<body>
  <div style="position: relative; width: 100%; max-width: min(500px, calc(55vh * (var(--grid-cols, 6) / var(--grid-rows, 6)))); display: flex; flex-direction: column; aspect-ratio: var(--grid-cols, 6) / var(--grid-rows, 6);"
      class="bot-grid-container">
      <div class="bot-grid" id="chal-grid" style="margin: 0; max-width: none;">
         <div class="grid-row" style="background: red;"></div>
         <div class="grid-row" style="background: blue;"></div>
         <div class="grid-row" style="background: green;"></div>
         <div class="grid-row" style="background: yellow;"></div>
         <div class="grid-row" style="background: pink;"></div>
         <div class="grid-row" style="background: cyan;"></div>
      </div>
  </div>
</body>
</html>
