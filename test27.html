<!DOCTYPE html>
<html>
<head>
<style>
  .bot-grid-container {
      height: auto;
      max-height: 60vh;
      max-width: min(100%, calc(60vh * (var(--grid-cols, 6) / var(--grid-rows, 6)))) !important;
  }
  .bot-grid {
      position: relative;
      display: flex;
      flex-direction: column;
      border: 3px solid black;
      border-radius: 8px;
      overflow: visible;
      background: white;
      width: 100%;
      /* removed aspect ratio */
      height: 100%; /* Trying this */
      margin: 0 auto;
  }
  .grid-row {
      display: flex;
      flex: 1;
      min-height: 0;
  }
  .bot-cell {
      flex: 1;
      height: 100%;
      min-width: 0;
      min-height: 0;
      border: 1px solid rgba(0, 0, 0, 0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: visible;
  }
</style>
</head>
<body style="--grid-cols: 6; --grid-rows: 6;">
<div style="width: 500px; height: 500px; position: relative;">
  <div style="position: relative; width: 100%; max-width: min(500px, calc(55vh * (var(--grid-cols, 6) / var(--grid-rows, 6)))); display: flex; flex-direction: column; aspect-ratio: var(--grid-cols, 6) / var(--grid-rows, 6);"
      class="bot-grid-container">
      <div class="bot-grid">
         <div class="grid-row" style="background: red;"><div class="bot-cell">1</div></div>
         <div class="grid-row" style="background: blue;"><div class="bot-cell">2</div></div>
      </div>
  </div>
</div>
</body>
</html>
