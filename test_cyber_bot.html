<!DOCTYPE html>
<html>
<head>
<style>
  .cell { width: 100px; height: 100px; border: 1px solid pink; background: #333; position: relative; }
</style>
</head>
<body>
  <div class="cell">
<svg viewBox="0 0 100 100" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Filtre néon basique pour le test -->
    <filter id="cyber-neon" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="1.5" result="blur" />
        <feMerge>
            <feMergeNode />
            <feMergeNode in="SourceGraphic" />
        </feMerge>
    </filter>
    <path id="cyber-arrow" transform="rotate(45 50 50)"
          d="M17.09 1.853a5 5 0 0 0-5.276 5.596l7.557 81.087c.483 3.938 5.137 5.773 8.176 3.223l15.947-12.932l7.15 12.385c4.112 7.122 10.636 8.872 17.758 4.76s8.87-10.638 4.758-17.76l-7.125-12.34l18.896-7.244c3.728-1.357 4.467-6.306 1.3-8.693L19.784 2.847a4.995 4.995 0 0 0-2.695-.994z" />
  </defs>

    <!-- original was transform="scale(0.85) translate(8, 8)"
         Let's try translating it slightly to the right to center it more -->
    <g transform="scale(0.85) translate(13, 7.5)">
        <!-- ===== COUCHE GLITCH : 3 copies RGB décalées ===== -->

        <!-- Rose fluo (décalée gauche) -->
        <use href="#cyber-arrow" fill="#FF10F0" opacity="0.85" filter="url(#cyber-neon)">
        </use>

        <!-- Vert Matrix (décalée droite) -->
        <use href="#cyber-arrow" fill="#00FF41" opacity="0.85" filter="url(#cyber-neon)">
        </use>

        <!-- Cyan (couche centrale qui saute) -->
        <use href="#cyber-arrow" fill="#00FFFF" opacity="0.5" filter="url(#cyber-neon)">
        </use>

        <!-- Contour net vert qui pulse -->
        <use href="#cyber-arrow" fill="none" stroke="#00FF41" stroke-width="0.4">
        </use>
    </g>
    <!-- Centre de la case -->
    <line x1="50" y1="0" x2="50" y2="100" stroke="white" stroke-width="0.5" />
    <line x1="0" y1="50" x2="100" y2="50" stroke="white" stroke-width="0.5" />
</svg>
  </div>
</body>
</html>
