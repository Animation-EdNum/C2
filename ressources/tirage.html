<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tirage au Sort</title>
    <meta property="og:title" content="Tirage au Sort">
    <meta property="og:description" content="Outil efficace et visuel pour désigner un élève au hasard.">
    <meta property="og:type" content="website">
    <link rel="icon" href="../favicon.svg" type="image/svg+xml">
    <script src="../js/lucide.min.js"></script>
    <link rel="stylesheet" href="../css/shared.css">
    <style>
        .action-buttons {
            position: absolute;
            top: 15px;
            right: 15px;
        }

        body > header, body > .app-shell {
            animation: fadeInCascade 0.6s var(--spring-easing) forwards;
        }

        :root {
            --primary: #0d9488;
            --primary-hover: #0f766e;
            --primary-light: rgba(13, 148, 136, 0.15);
            --bg-gradient-start: #0f766e;
            --bg-gradient-end: #064e4b;
            
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.3);
            --text-main: #0f172a;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --border: #e2e8f0;
            
            --success: #10b981;
            --error: #ef4444;
            --shadow-color: rgba(0, 0, 0, 0.1);
        }

        body.dark {
            --bg-gradient-start: #0f172a;
            --bg-gradient-end: #064e4b;
            --glass-bg: rgba(15, 23, 42, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: #334155;
            --primary-light: rgba(13, 148, 136, 0.3);
            --shadow-color: rgba(0, 0, 0, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            touch-action: manipulation;
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            color: var(--text-main);
            padding: 20px;
            transition: background 0.3s;
        }

        .app-shell {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px var(--shadow-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 40px);
        }

        /* HEADER */
        header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header-title-wrapper {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .header-icon {
            background: var(--primary);
            color: white;
            padding: 10px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(13, 148, 136, 0.3);
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.025em;
        }

        .header-actions {
            display: flex;
            gap: 0.5rem;
        }

        /* MAIN CONTENT */
        .app-main {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        /* SETUP VIEW */
        .setup-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .setup-card {
            width: 100%;
            max-width: 500px;
            padding: 2.5rem;
            background: rgba(0,0,0,0.03);
            border-radius: 20px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .tabs {
            display: flex;
            background: var(--border);
            padding: 4px;
            border-radius: 12px;
            gap: 4px;
        }

        .tab-btn {
            flex: 1;
            padding: 8px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-weight: 700;
            font-size: 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .tab-btn.active {
            background: var(--glass-bg);
            color: var(--primary);
            box-shadow: 0 2px 8px var(--shadow-color);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        input[type="number"],
        textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 2px solid var(--border);
            background: var(--glass-bg);
            color: var(--text-main);
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.2s;
        }

        textarea { min-height: 150px; resize: none; }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-light);
            background: white;
        }

        /* DRAW VIEW */
        .draw-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 2rem;
            gap: 2rem;
            overflow-y: auto;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .result-stage {
            background: var(--primary-light);
            border: 2px solid var(--primary);
            border-radius: 20px;
            padding: 3rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 220px;
        }

        .result-number {
            font-size: 4rem;
            font-weight: 900;
            color: var(--primary);
            line-height: 1.1;
            word-break: break-word;
        }

        .result-number.is-number { font-size: 6rem; }
        .rolling { opacity: 0.5; filter: blur(2px); transform: scale(0.9); transition: 0.1s; }
        .pulse { animation: pulseEffect 0.5s var(--spring-easing); }

        @keyframes pulseEffect {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); text-shadow: 0 0 20px var(--primary); }
            100% { transform: scale(1); }
        }

        .grid-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            padding: 12px;
            background: rgba(0,0,0,0.02);
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .cell {
            min-width: 44px;
            height: 44px;
            padding: 0 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--glass-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            user-select: none;
        }

        .cell:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--shadow-color);
        }

        .cell.drawn {
            opacity: 0.4;
            background: var(--border);
            text-decoration: line-through;
            cursor: default;
        }

        .cell.absent {
            background: #fee2e2;
            color: #ef4444;
            border-color: #fca5a5;
            text-decoration: line-through;
        }

        body.dark .cell.absent { background: #450a0a; color: #f87171; border-color: #7f1d1d; }

        .panel-section-title {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .history-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
        }

        .history-badge {
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            box-shadow: 0 2px 6px rgba(13, 148, 136, 0.2);
        }

        .legend-container {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-align: center;
            margin-top: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .legend-item { display: inline-flex; align-items: center; gap: 6px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; border: 1px solid var(--border); }
        .legend-dot.available { background: var(--glass-bg); }
        .legend-dot.absent { background: #fee2e2; border-color: #fca5a5; }
        .legend-dot.drawn { background: var(--border); }

        /* BUTTONS */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            font-family: inherit;
        }

        .back-btn {
            background: var(--primary-light);
            color: var(--primary);
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--primary);
            cursor: pointer;
            transition: 0.2s;
            margin-right: 0.75rem;
        }

        .back-btn:hover {
            background: var(--primary);
            color: white;
            transform: translateX(-2px);
        }

        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(13, 148, 136, 0.2); }
        .btn-primary:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 6px 16px rgba(13, 148, 136, 0.3); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary { background: var(--border); color: var(--text-main); }
        .btn-secondary:hover { background: var(--text-muted); color: white; }

        /* TOAST */
        #toast-container {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .toast {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            padding: 10px 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px var(--shadow-color);
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 0.85rem;
            animation: slideUp 0.3s forwards;
        }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        footer {
            margin-top: auto;
            padding: 1.5rem;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        footer a { color: var(--primary); font-weight: 700; text-decoration: none; }
        .hidden { display: none !important; }
        .stats-view {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--text-secondary);
            background: rgba(0,0,0,0.03);
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
    </style>
</head>

<body>
    <div class="action-buttons no-print">
        <a href="../index.html" class="icon-action-btn" title="Retour à l'accueil" aria-label="Retour à l'accueil">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
        </a>
        <button class="icon-action-btn" id="themeToggleBtn" aria-label="Changer de thème" title="Changer de thème">
            <i data-lucide="sun" id="icon-sun" style="display:none; width:20px;height:20px;"></i>
            <i data-lucide="moon" id="icon-moon" style="width:20px;height:20px;"></i>
        </button>
        <button class="icon-action-btn" id="audioToggleBtn" title="Activer/Désactiver le son" aria-label="Activer/Désactiver le son">
            <i data-lucide="volume-2" id="icon-vol-on" style="display:none; width:20px;height:20px;"></i>
            <i data-lucide="volume-x" id="icon-vol-off" style="width:20px;height:20px;"></i>
        </button>
    </div>

    <div class="app-shell">
        <header>
            <div class="header-title-wrapper">
                <button class="back-btn hidden" id="backToSetupBtn" title="Retour à la configuration">
                    <i data-lucide="arrow-left" style="width:20px;height:20px;"></i>
                </button>
                <div class="header-icon">
                    <i data-lucide="dices"></i>
                </div>
                <div>
                    <h1>Tirage au Sort</h1>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn btn-secondary hidden" id="resetDrawBtn" title="Réinitialiser le tirage">
                    <i data-lucide="rotate-ccw" style="width:16px;height:16px;"></i>
                    <span>Réinitialiser le tirage</span>
                </button>
            </div>
        </header>

        <div class="app-main">
            <!-- Phase 1: Setup -->
            <div class="setup-container" id="setupView">
                <div class="setup-card">
                    <div style="text-align: center;">
                        <h2 style="font-size: 1.25rem; font-weight: 800; margin-bottom: 0.5rem;">Configuration</h2>
                        <p style="font-size: 0.85rem; color: var(--text-secondary);">Choisissez vos participants</p>
                    </div>

                    <div class="tabs">
                        <button class="tab-btn active" data-mode="number">Nombres</button>
                        <button class="tab-btn" data-mode="names">Noms</button>
                    </div>

                    <div id="mode-number-view" class="input-group">
                        <label for="totalParticipants">Nombre de participants (ex: 24)</label>
                        <input type="number" id="totalParticipants" min="1" placeholder="Ex: 24">
                    </div>

                    <div id="mode-names-view" class="input-group hidden">
                        <label for="namesList">Liste des noms</label>
                        <textarea id="namesList" placeholder="Marie, Jean, Paul... ou un par ligne"></textarea>
                    </div>

                    <button class="btn btn-primary" id="initBtn" style="padding: 1.25rem;">
                        <i data-lucide="play" style="width:20px;height:20px;"></i>
                        Démarrer le tirage
                    </button>
                </div>
            </div>

            <!-- Phase 2: Draw -->
            <div class="draw-container hidden" id="drawView">
                <!-- Result Area -->
                <div class="result-stage">
                    <div class="result-number" id="drawnNumber">?</div>
                    <div id="finishedMsg" class="hidden" style="margin-top: 1rem; font-size: 0.9rem; font-weight: 800; color: var(--success);">Tirage terminé !</div>
                </div>

                <!-- Main Button -->
                <div class="controls-main">
                    <button class="btn btn-primary" id="drawBtn" style="width: 100%; padding: 1.5rem; font-size: 1.1rem;">
                        <i data-lucide="shuffle" style="width:24px;height:24px;"></i>
                        Tirer au sort (Entrée)
                    </button>
                </div>

                <!-- Grid & Legend -->
                <div class="grid-section">
                    <div class="panel-section-title" style="justify-content: center;">Grille des participants</div>
                    <div class="grid-container" id="participantItems"></div>
                    
                    <div class="legend-container">
                        <span style="font-weight: 800; color: var(--text-muted);">CYCLE :</span>
                        <span class="legend-item"><span class="legend-dot available"></span> Disponible</span>
                        <i data-lucide="arrow-right" style="width:12px;height:12px;opacity:0.5;"></i>
                        <span class="legend-item"><span class="legend-dot absent"></span> Absent</span>
                        <i data-lucide="arrow-right" style="width:12px;height:12px;opacity:0.5;"></i>
                        <span class="legend-item"><span class="legend-dot drawn"></span> Tiré</span>
                    </div>
                </div>

                <!-- History -->
                <div class="history-section" style="margin-top: 1rem;">
                    <div class="panel-section-title" style="justify-content: center;">
                        <span>Historique</span>
                        <button class="icon-action-btn" id="copyBtn" style="width:24px; height:24px; padding:4px;" title="Copier l'historique">
                            <i data-lucide="copy" style="width:12px;height:12px;"></i>
                        </button>
                    </div>
                    <div class="history-badges" id="historyBadges"></div>
                </div>

                <!-- Stats -->
                <div class="stats-section">
                    <div class="panel-section-title" style="justify-content: center;">Statistiques</div>
                    <div id="statsDisplay" class="stats-view"></div>
                </div>
            </div>
        </div>

        <footer class="no-print">
        <p>
            Webapp conçue par Vivian de l'<a href="https://www.hepvs.ch/fr/prestations-de-services/animation-pedagogique-12811/" target="_blank" rel="noopener noreferrer">AP EdNum</a> avec ❤️ et quelques neurones artificiels
            <br>
            <span style="font-size: 0.9em; opacity: 0.85;">
                <a href="https://github.com/Animation-EdNum/C2" target="_blank" rel="noopener noreferrer">Code 100% libre</a>
                (<a href="https://www.gnu.org/licenses/agpl-3.0.html" target="_blank" rel="noopener noreferrer">AGPL-3.0</a>)
            </span>
        </p>
    </footer>
    </div>

    <div id="toast-container"></div>

    <script>
        lucide.createIcons();

        // ==========================================
        // ÉTAT & CONFIGURATION
        // ==========================================
        const STATE_KEY = 'tirage_sort_v3';
        let state = {
            mode: 'number',
            allParticipants: [],
            availableParticipants: [],
            drawnParticipants: [],
            absentParticipants: [],
            drawHistory: []
        };
        let isDrawing = false;
        let audioCtx = null;
        let isMuted = true;

        // ==========================================
        // ÉLÉMENTS DOM
        // ==========================================
        const setupView = document.getElementById('setupView');
        const drawView = document.getElementById('drawView');
        const drawnNumber = document.getElementById('drawnNumber');
        const participantItems = document.getElementById('participantItems');
        const statsDisplay = document.getElementById('statsDisplay');
        const historyBadges = document.getElementById('historyBadges');
        const drawBtn = document.getElementById('drawBtn');
        const initBtn = document.getElementById('initBtn');
        const resetDrawBtn = document.getElementById('resetDrawBtn');
        const backToSetupBtn = document.getElementById('backToSetupBtn');
        const namesInput = document.getElementById('namesList');
        const totalInput = document.getElementById('totalParticipants');
        const finishedMsg = document.getElementById('finishedMsg');

        // Tabs Toggle
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.mode = btn.dataset.mode;
                document.getElementById('mode-number-view').classList.toggle('hidden', state.mode !== 'number');
                document.getElementById('mode-names-view').classList.toggle('hidden', state.mode !== 'names');
            });
        });

        // Audio Toggle
        document.getElementById('audioToggleBtn').addEventListener('click', () => {
            isMuted = !isMuted;
            document.getElementById('icon-vol-on').style.display = isMuted ? 'none' : 'block';
            document.getElementById('icon-vol-off').style.display = isMuted ? 'block' : 'none';
        });

        function playSound(type) {
            if (isMuted) return;
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const t = audioCtx.currentTime;
            if (type === 'tick') {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'square'; osc.frequency.setValueAtTime(600, t);
                osc.frequency.exponentialRampToValueAtTime(800, t + 0.05);
                gain.gain.setValueAtTime(0.05, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
                osc.start(); osc.stop(t + 0.05);
            } else if (type === 'ding') {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, t);
                osc.frequency.setValueAtTime(659.25, t + 0.1);
                gain.gain.setValueAtTime(0.2, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
                osc.start(); osc.stop(t + 0.8);
            }
        }

        function showToast(message, icon = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i data-lucide="${icon}" style="width:16px;height:16px;"></i> <span>${message}</span>`;
            container.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => toast.remove(), 3000);
        }

        function setView(view) {
            if (view === 'setup') {
                setupView.classList.remove('hidden');
                drawView.classList.add('hidden');
                backToSetupBtn.classList.add('hidden');
                resetDrawBtn.classList.add('hidden');
            } else {
                setupView.classList.add('hidden');
                drawView.classList.remove('hidden');
                backToSetupBtn.classList.remove('hidden');
                resetDrawBtn.classList.remove('hidden');
            }
        }

        function saveState() { localStorage.setItem(STATE_KEY, JSON.stringify(state)); }

        function loadState() {
            const saved = localStorage.getItem(STATE_KEY);
            if (saved) {
                state = JSON.parse(saved);
                totalInput.value = state.mode === 'number' ? state.allParticipants.length : '';
                namesInput.value = state.mode === 'names' ? state.allParticipants.join('\n') : '';
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === state.mode));
                document.getElementById('mode-number-view').classList.toggle('hidden', state.mode !== 'number');
                document.getElementById('mode-names-view').classList.toggle('hidden', state.mode !== 'names');
                if (state.allParticipants.length > 0) {
                    setView('draw');
                    updateUI();
                }
            } else {
                setView('setup');
            }
        }

        function initializeDraw() {
            let list = [];
            if (state.mode === 'number') {
                const max = parseInt(totalInput.value);
                if (!max || max < 1) return showToast('Entrez un nombre valide', 'alert-circle');
                list = Array.from({ length: max }, (_, i) => String(i + 1));
            } else {
                list = namesInput.value.split(/[\n,]+/).map(n => n.trim()).filter(n => n.length > 0);
                if (list.length < 2) return showToast('Entrez au moins 2 noms', 'alert-circle');
            }

            state.allParticipants = [...list];
            state.availableParticipants = [...list];
            state.drawnParticipants = [];
            state.absentParticipants = [];
            state.drawHistory = [];
            drawnNumber.textContent = '?';
            
            saveState();
            setView('draw');
            updateUI();
        }

        function triggerRoulette() {
            if (isDrawing || state.availableParticipants.length === 0) return;
            isDrawing = true; drawBtn.disabled = true;

            let elapsed = 0; const duration = 1200; const interval = 60;
            drawnNumber.classList.add('rolling');

            const timer = setInterval(() => {
                elapsed += interval;
                drawnNumber.textContent = state.availableParticipants[Math.floor(Math.random() * state.availableParticipants.length)];
                playSound('tick');
                if (elapsed >= duration) {
                    clearInterval(timer);
                    finalizeDraw();
                }
            }, interval);
        }

        function finalizeDraw() {
            const randomIndex = Math.floor(Math.random() * state.availableParticipants.length);
            const winner = state.availableParticipants[randomIndex];

            state.drawnParticipants.push(winner);
            state.drawHistory.push(winner);
            state.availableParticipants.splice(randomIndex, 1);

            drawnNumber.classList.remove('rolling');
            drawnNumber.textContent = winner;
            drawnNumber.classList.toggle('is-number', state.mode === 'number' && winner.length <= 3);
            drawnNumber.classList.add('pulse');
            setTimeout(() => drawnNumber.classList.remove('pulse'), 600);

            playSound('ding');
            isDrawing = false;
            saveState();
            updateUI();
        }

        function softReset() {
            state.availableParticipants = [...state.allParticipants].filter(p => !state.absentParticipants.includes(p));
            state.drawnParticipants = [];
            state.drawHistory = [];
            drawnNumber.textContent = '?';
            saveState();
            updateUI();
            showToast('Tirage réinitialisé', 'rotate-ccw');
        }

        function updateUI() {
            const drawn = state.drawnParticipants.length;
            const absent = state.absentParticipants.length;
            const avail = state.availableParticipants.length;
            statsDisplay.innerHTML = `
                <div>Disponibles: ${avail}</div>
                <div>Tirés: ${drawn}</div>
                <div>Absents: ${absent}</div>
            `;
            
            drawBtn.disabled = avail === 0;
            finishedMsg.classList.toggle('hidden', avail > 0 || drawn === 0);
            
            participantItems.innerHTML = '';
            state.allParticipants.forEach(p => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if (state.drawnParticipants.includes(p)) cell.classList.add('drawn');
                if (state.absentParticipants.includes(p)) cell.classList.add('absent');
                cell.textContent = p;
                cell.addEventListener('click', () => toggleParticipantState(p));
                participantItems.appendChild(cell);
            });

            historyBadges.innerHTML = state.drawHistory.length > 0 
                ? state.drawHistory.map(h => `<span class="history-badge">${h}</span>`).join('')
                : '<span style="font-size:0.75rem; opacity:0.5; font-style:italic;">Aucun historique</span>';
        }

        function toggleParticipantState(p) {
            if (isDrawing) return;
            if (state.absentParticipants.includes(p)) {
                state.absentParticipants = state.absentParticipants.filter(x => x !== p);
                if (!state.drawnParticipants.includes(p)) {
                    state.drawnParticipants.push(p);
                    state.availableParticipants = state.availableParticipants.filter(x => x !== p);
                    if (!state.drawHistory.includes(p)) state.drawHistory.push(p);
                }
            } else if (state.drawnParticipants.includes(p)) {
                state.drawnParticipants = state.drawnParticipants.filter(x => x !== p);
                if (!state.availableParticipants.includes(p)) state.availableParticipants.push(p);
                state.drawHistory = state.drawHistory.filter(x => x !== p);
            } else {
                state.availableParticipants = state.availableParticipants.filter(x => x !== p);
                if (!state.absentParticipants.includes(p)) state.absentParticipants.push(p);
            }
            saveState();
            updateUI();
        }

        initBtn.addEventListener('click', initializeDraw);
        drawBtn.addEventListener('click', triggerRoulette);
        resetDrawBtn.addEventListener('click', softReset);
        backToSetupBtn.addEventListener('click', () => setView('setup'));
        
        document.getElementById('copyBtn').addEventListener('click', () => {
            if (state.drawHistory.length === 0) return;
            navigator.clipboard.writeText(state.drawHistory.join('\n'));
            showToast('Historique copié', 'copy');
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !isDrawing && !drawBtn.disabled && document.activeElement.tagName !== 'TEXTAREA') {
                triggerRoulette();
            }
        });

        loadState();
    </script>
    <script src="../js/theme.js"></script>
<script src="../js/swipe.js"></script>
</body>

</html>
