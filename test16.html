<!DOCTYPE html>
<html>
<head>
<style>
  .bot-grid-container {
      height: auto;
      max-height: 60vh;
      max-width: min(100%, calc(60vh * (var(--grid-cols, 6) / var(--grid-rows, 6)))) !important;
  }
  .bot-grid {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      border: 3px solid black;
      border-radius: 8px;
      overflow: visible;
      background: white;
  }
  .grid-row {
      display: flex;
      flex: 1;
      min-height: 0;
  }
  .bot-cell {
      flex: 1;
      height: 100%;
      min-width: 0;
      min-height: 0;
      border: 1px solid rgba(0, 0, 0, 0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: visible;
  }
</style>
</head>
<body>
  <!-- what if we just position absolute the inner bot grid? -->
</body>
</html>
