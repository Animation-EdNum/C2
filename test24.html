<!DOCTYPE html>
<html>
<head>
<style>
  .bot-grid-container {
      height: auto;
      max-height: 60vh;
      max-width: min(100%, calc(60vh * (var(--grid-cols, 6) / var(--grid-rows, 6)))) !important;
  }
  .bot-grid {
      position: absolute; top:0; left:0; bottom:0; right:0; /* This ensures it fills the container perfectly */
      display: flex;
      flex-direction: column;
      border: 3px solid black;
      border-radius: 8px;
      overflow: visible;
      background: white;
      margin: 0 auto;
  }
  .grid-row {
      display: flex;
      flex: 1;
      min-height: 0;
  }
  .bot-cell {
      flex: 1;
      height: 100%;
      min-width: 0;
      min-height: 0;
      border: 1px solid rgba(0, 0, 0, 0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: visible;
  }
</style>
</head>
<body>
<div style="--grid-cols: 6; --grid-rows: 6;">
  <!-- If we apply position absolute to bot-grid, we must remove aspect-ratio and max-width from bot-grid itself in CSS -->
</div>
</body>
</html>
