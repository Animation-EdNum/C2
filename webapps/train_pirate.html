<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #f0f0f0; display: flex; flex-direction: row; gap: 20px; }
        .cell { width: 100px; height: 100px; background: #fff; border: 1px solid #ccc; position: relative; }
        .robot-body { width: 100%; height: 100%; }

    </style>
</head>
<body>

    <div class="cell" id="new-pirate">
        <div class="robot-body" style="transform:rotate(0deg)">
             <svg viewBox="0 0 100 100" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                    <g transform="scale(0.8) translate(12.5, 12.5)">
                        <!-- Coque avec plus de détails (forme bateau pirate) -->
                        <path d="M 20 20 Q 50 5 80 20 L 75 80 Q 50 95 25 80 Z" fill="#5C4033" stroke="#3E2723" stroke-width="2"/>
                        <!-- Pont intérieur -->
                        <path d="M 28 25 Q 50 12 72 25 L 68 75 Q 50 85 32 75 Z" fill="#8B4513" stroke="#3E2723" stroke-width="1"/>

                        <!-- Détails du pont (planches) -->
                        <line x1="30" y1="35" x2="70" y2="35" stroke="#3E2723" stroke-width="0.5" opacity="0.6"/>
                        <line x1="28" y1="50" x2="72" y2="50" stroke="#3E2723" stroke-width="0.5" opacity="0.6"/>
                        <line x1="30" y1="65" x2="70" y2="65" stroke="#3E2723" stroke-width="0.5" opacity="0.6"/>

                        <!-- Voiles déployées sur le côté -->
                        <!-- Voile avant -->
                        <path d="M 15 45 Q 50 35 85 45 Q 70 25 50 25 Q 30 25 15 45 Z" fill="#F5F5DC" stroke="#D3D3D3" stroke-width="1"/>
                        <!-- Voile arrière -->
                        <path d="M 10 70 Q 50 60 90 70 Q 75 45 50 45 Q 25 45 10 70 Z" fill="#F5F5DC" stroke="#D3D3D3" stroke-width="1"/>

                        <!-- Mâts (vus de dessus) -->
                        <circle cx="50" cy="30" r="4" fill="#3E2723"/>
                        <circle cx="50" cy="55" r="4" fill="#3E2723"/>

                        <!-- Vergues (barres qui tiennent les voiles) -->
                        <line x1="20" y1="30" x2="80" y2="30" stroke="#3E2723" stroke-width="2" stroke-linecap="round"/>
                        <line x1="15" y1="55" x2="85" y2="55" stroke="#3E2723" stroke-width="2" stroke-linecap="round"/>

                        <!-- Symbole Pirate (Tête de mort simplifiée) sur le pont ou grand pavillon central -->
                        <g transform="translate(50, 48) scale(0.6)">
                            <!-- Fond noir du drapeau horizontal -->
                            <rect x="-15" y="-10" width="30" height="20" fill="black" rx="2"/>
                            <!-- Tête de mort -->
                            <circle cx="0" cy="-2" r="4" fill="white"/>
                            <!-- Os croisés -->
                            <line x1="-6" y1="-6" x2="6" y2="4" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                            <line x1="-6" y1="4" x2="6" y2="-6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                        </g>

                        <!-- Canons qui dépassent sur les côtés -->
                        <g fill="#222">
                            <rect x="15" y="38" width="10" height="4" rx="1"/>
                            <rect x="75" y="38" width="10" height="4" rx="1"/>
                            <rect x="12" y="62" width="10" height="4" rx="1"/>
                            <rect x="78" y="62" width="10" height="4" rx="1"/>
                        </g>

                        <!-- Sillage d'eau -->
                        <path d="M 15 85 Q 50 110 85 85" fill="none" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
                    </g>
             </svg>
        </div>
    </div>
    <div class="cell" id="new-train">
        <div class="robot-body" style="transform:rotate(0deg)">
             <svg viewBox="0 0 100 100" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                    <g transform="scale(0.8) translate(12.5, 12.5)">
                        <!-- Pas de rails dans le SVG, ils seront dessinés par le trail ! -->

                        <!-- Sifflet / Vapeur à l'arrière ou avant -->
                        <circle cx="50" cy="5" r="8" fill="#e5e7eb" opacity="0.8"/>
                        <circle cx="45" cy="-2" r="6" fill="#e5e7eb" opacity="0.6"/>
                        <circle cx="55" cy="-5" r="5" fill="#e5e7eb" opacity="0.4"/>

                        <!-- Châssis principal de la locomotive (vue de dessus) -->
                        <rect x="25" y="10" width="50" height="80" rx="5" fill="#1f2937" stroke="#000" stroke-width="2"/>

                        <!-- Pare-buffles / Chasse-pierres avant (triangle inversé) -->
                        <polygon points="20,10 80,10 50,0" fill="#374151" stroke="#111" stroke-width="1"/>
                        <!-- Détail rayures sur chasse-pierres -->
                        <line x1="25" y1="8" x2="75" y2="8" stroke="#facc15" stroke-width="1"/>

                        <!-- Cabine arrière -->
                        <rect x="22" y="60" width="56" height="25" rx="3" fill="#dc2626" stroke="#991b1b" stroke-width="2"/>
                        <!-- Toit de la cabine avec effet bombé -->
                        <rect x="26" y="63" width="48" height="18" rx="2" fill="#b91c1c" />
                        <rect x="30" y="65" width="40" height="14" rx="1" fill="#7f1d1d" />

                        <!-- Chaudière centrale allongée -->
                        <rect x="35" y="15" width="30" height="45" rx="15" fill="#4b5563" stroke="#1f2937" stroke-width="2"/>
                        <!-- Dôme de vapeur (au centre) -->
                        <circle cx="50" cy="40" r="10" fill="#fbbf24" stroke="#d97706" stroke-width="2"/>
                        <!-- Dôme de sable (avant) -->
                        <circle cx="50" cy="25" r="7" fill="#fbbf24" stroke="#d97706" stroke-width="1.5"/>

                        <!-- Cheminée avant -->
                        <circle cx="50" cy="12" r="8" fill="#111" stroke="#333" stroke-width="1"/>
                        <circle cx="50" cy="12" r="4" fill="#000" />

                        <!-- Pistons / Roues latérales dépassant légèrement -->
                        <rect x="20" y="25" width="5" height="20" rx="2" fill="#94a3b8" />
                        <rect x="75" y="25" width="5" height="20" rx="2" fill="#94a3b8" />

                        <!-- Bielles (tiges reliant les roues) -->
                        <line x1="22" y1="30" x2="22" y2="70" stroke="#f8fafc" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="78" y1="30" x2="78" y2="70" stroke="#f8fafc" stroke-width="1.5" stroke-linecap="round"/>

                        <!-- Attelage arrière -->
                        <rect x="45" y="85" width="10" height="10" fill="#374151" />
                        <circle cx="50" cy="95" r="4" fill="#111" />
                    </g>
             </svg>
        </div>
    </div>
</body>
</html>
