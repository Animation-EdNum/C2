<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Éducation numérique • Cycle 1</title>
    <meta property="og:title" content="Éducation numérique • Cycle 1">
    <meta property="og:description" content="Webapps pour l'éducation numérique 1-4H">
    <meta property="og:type" content="website">
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="stylesheet" href="assets/css/shared.css">
    <style>
        body>header,
        body>main {
            animation: fadeInCascade 0.6s var(--spring-easing) forwards;
        }

        @keyframes fadeInCascade {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --secondary: #475569;
            --bg: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-main: #0f172a;
            --text-light: #64748b;
            --border: #e2e8f0;
            --header-bg: linear-gradient(135deg, #1e3a8a, #3b82f6);
            --header-text: #ffffff;
            --section-title: #1e3a8a;
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --card-shadow-hover: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        body.dark {
            --primary: #3b82f6;
            --primary-hover: #60a5fa;
            --secondary: #94a3b8;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.85);
            --text-main: #f8fafc;
            --text-light: #cbd5e1;
            --border: #334155;
            --header-bg: linear-gradient(135deg, #0f172a, #1e3a8a);
            --header-text: #f8fafc;
            --section-title: #60a5fa;
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
            --card-shadow-hover: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.3);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s ease, color 0.3s ease;
            font-family: 'Outfit', 'Segoe UI', system-ui, sans-serif;
            background-image:
                radial-gradient(var(--border) 1px, transparent 1px),
                radial-gradient(var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
        }

        .main-header {
            background: var(--header-bg);
            color: var(--header-text);
            padding: 1rem 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-container i,
        .logo-container svg {
            font-size: 1.5rem;
            width: 1.5rem;
            height: 1.5rem;
            color: #fbbf24;
        }

        .site-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.02em;
        }

        main {
            flex: 1;
            padding: 2rem 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: linear-gradient(135deg, var(--theme-start, var(--card-bg)), var(--theme-end, var(--card-bg)));
            border-radius: 16px;
            padding: 1.5rem;
            text-decoration: none;
            color: #fff;
            box-shadow: var(--card-shadow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(5px);
        }

        .card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: var(--card-shadow-hover);
            border-color: var(--primary);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), #60a5fa);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s ease;
        }

        .card:hover::before {
            transform: scaleX(1);
        }

        .card-icon-main {
            text-align: center;
            margin: 20px 0;
        }

        .card-icon-main i, .card-icon-main svg {
            font-size: 80px;
            width: 80px;
            height: 80px;
        }

        .card-icons-small i,
        .card-icons-small svg {
            width: 1.5rem;
            height: 1.5rem;
        }

        .card-icons-small {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            color: var(--text-light);
            font-size: 1.5rem;
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            justify-content: center;
            text-align: center;
        }

        footer {
            margin-top: 2rem;
            padding: 3rem 1rem;
            text-align: center;
            color: var(--text-light);
            font-size: 0.875rem;
            border-top: 1px solid var(--border);
            background: var(--bg);
        }

        footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        footer a:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }

        .footer-links {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 1rem;
            margin-bottom: 1rem;
        }

        .theme-toggle {
            background: none;
            border: none;
            color: var(--header-text);
            cursor: pointer;
            font-size: 1.25rem;
            padding: 0.5rem;
            border-radius: 50%;
            transition: background-color 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-toggle:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body>

    <header class="main-header">
        <div class="header-content">
            <div class="logo-container">
                <i data-fa="dt-star" style="--fa-primary:#fbbf24;--fa-secondary:#f59e0b;"></i>
                <h1 class="site-title">Éducation numérique • Cycle 1</h1>
            </div>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <button class="theme-toggle" id="themeToggleBtn" title="Mode sombre/clair" aria-label="Changer de thème">
                <svg id="icon-sun" style="display:none;" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <svg id="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
            </div>
        </div>
    </header>

    <main>
        <div class="grid">
            <a href="alpha/webapps/machine_a_trier.html" class="card" style="--theme-start: #15803d; --theme-end: #166534;">
                <div class="card-icon-main">
                    <i data-fa="person-carry-box" style="color: #fff;"></i>
                </div>
                <div class="card-icons-small" style="color: #fff;">
                    <i data-fa="shapes"></i>
                    <i data-fa="hand-pointer"></i>
                    <i data-fa="check"></i>
                </div>
                <div class="card-title">Machine à trier</div>
            </a>

            <a href="alpha/webapps/jeu_de_la_grue.html" class="card" style="--theme-start: #f6d365; --theme-end: #fda085;">
                <div class="card-icon-main">
                    <i data-fa="arrow-up-from-square" style="color: #fff;"></i>
                </div>
                <div class="card-icons-small" style="color: #fff;">
                    <i data-fa="arrows-up-down-left-right"></i>
                    <i data-fa="magnet"></i>
                    <i data-fa="flag-checkered"></i>
                </div>
                <div class="card-title">Jeu de la grue</div>
            </a>

            <a href="webapps/simulateur_bluebot.html" class="card" style="--theme-start: #3b82f6; --theme-end: #1d4ed8;">
                <div class="card-icon-main">
                    <i data-fa="robot-astromech" style="color: #fff;"></i>
                </div>
                <div class="card-icons-small" style="color: #fff;">
                    <i data-fa="robot"></i>
                    <i data-fa="arrow-turn-up"></i>
                    <i data-fa="border-all"></i>
                </div>
                <div class="card-title">Simulateur d'automate</div>
            </a>
        </div>
    </main>

    <footer class="no-print">
        <p>
            Webapps conçues par Vivian de l'<a
                href="https://www.hepvs.ch/fr/prestations-de-services/animation-pedagogique-12811/" target="_blank"
                rel="noopener noreferrer">AP EdNum</a> avec ❤️ et quelques neurones artificiels
            <br>
            <span style="font-size: 0.9em; opacity: 0.85;">
                <a href="https://github.com/Animation-EdNum/C2" target="_blank" rel="noopener noreferrer">Code 100%
                    libre</a>
                (<a href="https://www.gnu.org/licenses/agpl-3.0.html" target="_blank"
                    rel="noopener noreferrer">AGPL-3.0</a>)
            </span>
        </p>
        <div class="footer-links">
            <a href="index.html">Retour au portail complet</a>
        </div>
    </footer>

    <script src="assets/js/theme.js"></script>
    <script src="assets/js/fa-subset.js"></script>
    <script>
        fa.createIcons();
    </script>
</body>

</html>
