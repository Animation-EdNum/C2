<!DOCTYPE html>
<html>
<head>
<style>
  .bot-grid {
      position: relative;
      display: flex;
      flex-direction: column;
      border: 3px solid black;
      border-radius: 8px;
      overflow: visible;
      background: white;
      width: 100%;
      max-width: min(100%, calc(55vh * (var(--grid-cols, 6) / var(--grid-rows, 6))));
      aspect-ratio: var(--grid-cols, 6) / var(--grid-rows, 6);
      margin: 0 auto;
  }
  .grid-row {
      display: flex;
      flex: 1;
      min-height: 0;
  }
</style>
</head>
<body>
  <div style="position: relative; width: 100%; max-width: min(500px, calc(55vh * (var(--grid-cols, 6) / var(--grid-rows, 6)))); display: flex; flex-direction: column; aspect-ratio: var(--grid-cols, 6) / var(--grid-rows, 6);"
      class="bot-grid-container">
      <div class="bot-grid" id="chal-grid" style="margin: 0; max-width: none;"></div>
  </div>
</body>
</html>
