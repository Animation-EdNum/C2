<!DOCTYPE html>
<html>
<head>
<style>
  .bot-grid-container {
      height: auto;
      max-height: 60vh;
      max-width: min(100%, calc(60vh * (var(--grid-cols, 6) / var(--grid-rows, 6)))) !important;
  }
  .bot-grid {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      border: 3px solid black;
      border-radius: 8px;
      overflow: visible;
      background: white;
      width: 100%;
      height: 100%;
      /* aspect-ratio: var(--grid-cols, 6) / var(--grid-rows, 6); */
      margin: 0 auto;
  }
  .grid-row {
      display: flex;
      flex: 1;
      min-height: 0;
  }
  .bot-cell {
      flex: 1;
      height: 100%;
      min-width: 0;
      min-height: 0;
      border: 1px solid rgba(0, 0, 0, 0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: visible;
  }
  @media (min-width: 1200px) {
      .exercise-card {
          display: grid;
          grid-template-columns: 1fr 350px;
          gap: 30px;
          align-items: start;
      }

      .grid-wrapper {
          grid-column: 1;
          grid-row: 1 / span 4;
      }
  }
</style>
</head>
<body>
<div class="exercise-card">
  <div class="grid-wrapper">
    <div class="grid-layout-wrapper" style="display: flex; align-items: flex-start; justify-content: center; width: 100%;">
      <div style="position: relative; width: 100%; max-width: min(500px, calc(55vh * (var(--grid-cols, 6) / var(--grid-rows, 6)))); display: flex; flex-direction: column; aspect-ratio: var(--grid-cols, 6) / var(--grid-rows, 6);"
          class="bot-grid-container">
          <div class="bot-grid" id="chal-grid" style="margin: 0; max-width: none;">
             <div class="grid-row" style="background: red;"><div class="bot-cell"></div></div>
             <div class="grid-row" style="background: blue;"><div class="bot-cell"></div></div>
             <div class="grid-row" style="background: green;"><div class="bot-cell"></div></div>
             <div class="grid-row" style="background: yellow;"><div class="bot-cell"></div></div>
             <div class="grid-row" style="background: pink;"><div class="bot-cell"></div></div>
             <div class="grid-row" style="background: cyan;"><div class="bot-cell"></div></div>
          </div>
      </div>
    </div>
  </div>
  <div style="background: lightgray; min-height: 500px;">Right side</div>
</div>
</body>
</html>
