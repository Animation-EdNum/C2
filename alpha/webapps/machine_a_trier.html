<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>📦 Machine à trier</title>
    <meta property="og:title" content="Machine à trier">
    <meta property="og:description" content="Trie les objets dans le bon bac selon leur forme ou leur couleur.">
    <link rel="icon" href="../../assets/favicon.svg" type="image/svg+xml">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../assets/css/shared.css">
    <style>
        body > header, body > .container {
            animation: fadeInCascade 0.6s var(--spring-easing) forwards;
        }

        :root {
            --bg-gradient-start: #667eea; --bg-gradient-end: #764ba2;
            --card-bg: rgba(249, 250, 252, 0.85); --card-border: #e0e7ff; --container-bg: rgba(255, 255, 255, 0.85);
            --text-main: #333; --text-secondary: #666; --text-muted: #777;
            --accent: #667eea; --accent-dark: #5568d3;
            --badge-bg: #ede9fe; --badge-color: #6d28d9;
            --input-border: #cbd5f5; --instructions-bg: #f0f4ff;
            --success: #166534; --error: #b91c1c;
            --shadow-color: rgba(0, 0, 0, 0.3); --card-shadow: rgba(102, 126, 234, 0.15);
        }

        body.dark {
            --bg-gradient-start: #0f172a; --bg-gradient-end: #1e1b4b;
            --card-bg: rgba(30, 41, 59, 0.75); --card-border: #334155; --container-bg: rgba(15, 23, 42, 0.75);
            --text-main: #f8fafc; --text-secondary: #94a3b8; --text-muted: #64748b;
            --accent: #6366f1; --accent-dark: #4f46e5;
            --badge-bg: #312e81; --badge-color: #818cf8;
            --input-border: #334155; --instructions-bg: #1e293b;
            --success: #34d399; --error: #f87171;
            --shadow-color: rgba(0, 0, 0, 0.5); --card-shadow: rgba(0, 0, 0, 0.4);
        }

        body.dark .icon-action-btn { background: rgba(0, 0, 0, 0.4); border-color: rgba(255,255,255,0.1); }
        body.dark .bin { border-color: #475569; background: rgba(30, 41, 59, 0.8); }
        body.dark .item { border-color: #475569; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            touch-action: manipulation;
            font-family: 'Outfit', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh; padding: 20px; color: var(--text-main);
        }

        .container {
            max-width: var(--container-max-width, 1400px); margin: 0 auto; background: var(--container-bg);
            padding: 30px; border-radius: var(--radius-xl); box-shadow: 0 20px 60px var(--shadow-color);
            backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: var(--glass-border);
        }

        h1 { text-align: center; color: var(--accent); margin-bottom: 5px; font-size: 28px; }
        .subtitle { text-align: center; color: var(--text-secondary); margin-bottom: 20px; font-size: 14px; }

        /* ========== DIFFICULTÉ ========== */
        .difficulty-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 25px; flex-wrap: wrap; }
        .diff-btn {
            padding: 6px 16px; border-radius: var(--radius-2xl); border: 2px solid var(--accent);
            background: transparent; color: var(--accent); font-size: 14px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; outline: none;
            min-width: 44px; min-height: 44px;
        }
        .diff-btn.active { background: var(--accent); color: #fff; }
        .diff-btn:hover:not(.active) { background: #eef2ff; }

        /* ========== GAME AREA ========== */
        .game-area {
            display: flex; flex-direction: column; align-items: center; gap: 30px;
            margin-bottom: 30px;
        }

        .items-container {
            display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;
            min-height: 80px; padding: 10px; border-radius: var(--radius-lg);
            background: rgba(0,0,0,0.05); width: 100%; max-width: var(--container-max-width, 1400px);
        }

        body.dark .items-container { background: rgba(255,255,255,0.05); }

        /* Factory Mode (Tapis roulant) */
        .items-container.conveyor-mode {
            position: relative;
            overflow: hidden;
            background: repeating-linear-gradient(
                -45deg,
                #e2e8f0,
                #e2e8f0 20px,
                #cbd5e1 20px,
                #cbd5e1 40px
            );
            background-size: 56px 56px;
            animation: moveBelt 2s linear infinite;
            min-height: 100px;
        }
        body.dark .items-container.conveyor-mode {
            background: repeating-linear-gradient(
                -45deg,
                #334155,
                #334155 20px,
                #1e293b 20px,
                #1e293b 40px
            );
        }

        @keyframes moveBelt {
            0% { background-position: 0 0; }
            100% { background-position: 56px 0; }
        }

        .items-container.conveyor-mode .item {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            /* Other transforms are handled by JS to prevent conflict */
        }
        .items-container.conveyor-mode .item:active,
        .items-container.conveyor-mode .item.selected {
            transform: translateY(-50%) scale(1.1);
        }

        .item {
            width: 60px; height: 60px; border-radius: var(--radius-lg);
            display: flex; align-items: center; justify-content: center;
            cursor: grab; transition: transform 0.2s, box-shadow 0.2s;
            background: #fff; border: 2px solid #e2e8f0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            user-select: none;
        }
        .item:active { cursor: grabbing; transform: scale(1.1); box-shadow: 0 8px 15px rgba(0,0,0,0.2); }
        .item.selected { transform: scale(1.1); border-color: var(--accent); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.4); }

        .bins-container {
            display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;
            width: 100%;
        }

        .bin {
            width: 160px; min-height: 180px; border: 3px dashed #cbd5e1; border-radius: var(--radius-xl);
            display: flex; flex-direction: row; flex-wrap: wrap; align-content: flex-start; justify-content: center;
            background: #f8fafc; transition: all 0.2s; padding: 10px; gap: 5px;
            cursor: pointer; position: relative;
        }
        .bin:hover, .bin.drag-over {
            border-color: var(--accent); background: #e0e7ff;
            transform: translateY(-5px);
        }
        .bin-label {
            width: 100%;
            font-weight: 600; font-size: 14px; text-transform: uppercase;
            text-align: center; color: var(--text-secondary); pointer-events: none;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
            margin-bottom: 10px;
        }
        .bin .item {
            width: 40px; height: 40px;
            min-width: 40px; min-height: 40px;
        }
        .bin .item svg {
            width: 60% !important; height: 60% !important;
        }
        .bin-icon {
            width: 32px; height: 32px;
        }

        .sorter-container .color-red { color: #ef4444; }
        .sorter-container .color-blue { color: #3b82f6; }
        .sorter-container .color-green { color: #22c55e; }
        .sorter-container .color-yellow { color: #eab308; }
        .sorter-container .color-purple { color: #a855f7; }

        .sorter-container .bg-red { background-color: #ef4444; }
        .sorter-container .bg-blue { background-color: #3b82f6; }
        .sorter-container .bg-green { background-color: #22c55e; }
        .sorter-container .bg-yellow { background-color: #eab308; }
        .sorter-container .bg-purple { background-color: #a855f7; }

        .shape-icon { width: 40px; height: 40px; }

        /* ========== FEEDBACK & SCORE ========== */
        .feedback { font-size: 16px; font-weight: 600; text-align: center; height: 24px; margin-bottom: 10px; transition: color 0.3s; }
        .feedback.success { color: var(--success); }
        .feedback.error { color: var(--error); }

        .score-bar { display: flex; justify-content: center; gap: 24px; margin-top: 25px; padding-top: 20px; border-top: 1px solid var(--card-border); flex-wrap: wrap; }
        .score-item { text-align: center; }
        .score-item .score-label { font-size: 14px; color: var(--text-muted); text-transform: uppercase; }
        .score-item .score-value { font-size: 22px; font-weight: 700; color: var(--accent); font-family: monospace; }

        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }

        @media print { .no-print { display: none !important; } }
    </style>
    <script src="../../assets/js/scores.js"></script>
    <script src="../../assets/js/audio.js"></script>
    <script src="../../assets/js/fa-subset.js"></script>
</head>
<body>
    <a href="#main-content" class="skip-link">Aller au contenu principal</a>
    <!-- Preload icons for JS -->
    <div style="display: none;">
        <i data-fa="circle"></i>
        <i data-fa="square"></i>

    <div class="container" id="main-content">
        <header class="app-header">
            <div class="header-title-wrapper">
                <a href="../../index.html" class="header-icon" title="Retour à l'accueil" aria-label="Retour à l'accueil">
                    <i data-fa="person-carry-box"></i>
                </a>
                <div>
                    <h1>Machine à trier</h1>

            </div>
            <div class="action-buttons">
                <div class="settings-dropdown">
                    <button class="icon-action-btn" title="Options" aria-label="Options" id="optionsMenuBtn">

                    </button>
                    <div class="settings-dropdown-content">
                        <button class="menu-item-btn" id="score-manager-btn" aria-label="Voir mes statistiques">

                        </button>
                        <button class="menu-item-btn" id="themeToggleBtn" aria-label="Changer de thème">

                            <span id="themeToggleText">Changer le thème</span>
                        </button>
                        <button class="menu-item-btn" id="audioToggleBtn" aria-label="Activer/Désactiver le son">

        <main>

            <!-- GAME AREA -->
            <div class="game-area">

    <script src="../../assets/js/confetti.js"></script>
    <script>
        const COLORS = [
            { id: 'red', name: 'Rouge', hex: '#ef4444' },
            { id: 'blue', name: 'Bleu', hex: '#3b82f6' },
            { id: 'green', name: 'Vert', hex: '#22c55e' },
            { id: 'yellow', name: 'Jaune', hex: '#eab308' },
            { id: 'purple', name: 'Violet', hex: '#a855f7' }
        ];

        const SHAPES = [
            { id: 'circle', name: 'Cercle', icon: 'circle' },
            { id: 'square', name: 'Carré', icon: 'square' },
            { id: 'triangle', name: 'Triangle', icon: 'triangle' },
            { id: 'star', name: 'Étoile', icon: 'star' },
            { id: 'hexagon', name: 'Hexagone', icon: 'hexagon' }
        ];

        const QUANTITIES = [
            { id: '1', name: '1', icon: 'dice-one' },
            { id: '2', name: '2', icon: 'dice-two' },
            { id: '3', name: '3', icon: 'dice-three' },
            { id: '4', name: '4', icon: 'dice-four' },
            { id: '5', name: '5', icon: 'dice-five' },
            { id: '6', name: '6', icon: 'dice-six' }
        ];

        const SIZES = [
            { id: 'small', name: 'Petit', scale: 0.5 },
            { id: 'medium', name: 'Moyen', scale: 0.8 },
            { id: 'large', name: 'Grand', scale: 1.1 },
            { id: 'xlarge', name: 'Très grand', scale: 1.4 }
        ];

        let currentMode = 'color'; // 'color', 'shape', 'quantity', 'size'
        let currentDifficulty = 'medium'; // 'easy', 'medium', 'hard'
        let isFactoryMode = false;

        let globalCorrect = 0;
        let globalStreak = 0;
        let globalBest = 0;

        let perfectLevelsStreak = 0;
        let mistakesInCurrentLevel = 0;

        let selectedItem = null;

        // Variables pour mode Usine
        let factoryAnimationId = null;
        let factoryItemsQueue = []; // Objets en attente
        let activeBeltItems = []; // Objets actuellement sur le tapis
        let factoryLastSpawnTime = 0;
        let isDragged = false; // Bloquer animation si objet draggué

        // UI Elements
        const itemsContainer = document.getElementById('items-container');
        const binsContainer = document.getElementById('bins-container');

        // Initialisation
        function init() {
            setupEventListeners();
            startNewLevel();
            ScoreManager.init('machine_a_trier');
            ScoreManager.checkAdaptiveDifficulty = function() {}; // Disable per-item popups
        }

        function setPlaystyle(style) {
            perfectLevelsStreak = 0;
            isFactoryMode = (style === 'factory');
            document.getElementById('playstyle-classic').classList.toggle('active', !isFactoryMode);
            document.getElementById('playstyle-factory').classList.toggle('active', isFactoryMode);

            if (isFactoryMode) {
                itemsContainer.classList.add('conveyor-mode');
            } else {
                itemsContainer.classList.remove('conveyor-mode');
            }
            startNewLevel();
        }

        function setupEventListeners() {
            // Style de jeu
            document.getElementById('playstyle-classic').addEventListener('click', () => setPlaystyle('classic'));
            document.getElementById('playstyle-factory').addEventListener('click', () => setPlaystyle('factory'));

            // Tabs
            document.getElementById('tab-color').addEventListener('click', () => setMode('color'));
            document.getElementById('tab-shape').addEventListener('click', () => setMode('shape'));
            document.getElementById('tab-quantity').addEventListener('click', () => setMode('quantity'));
            document.getElementById('tab-size').addEventListener('click', () => setMode('size'));

            // Difficulty
            document.getElementById('diff-easy').addEventListener('click', () => setDifficulty('easy'));
            document.getElementById('diff-medium').addEventListener('click', () => setDifficulty('medium'));
            document.getElementById('diff-hard').addEventListener('click', () => setDifficulty('hard'));

            // Listen for global difficulty change
            window.addEventListener('c2_change_difficulty', (e) => {
                const nextDiff = e.detail.difficulty;
                if (nextDiff === 'easy') document.getElementById('diff-easy')?.click();
                else if (nextDiff === 'medium') document.getElementById('diff-medium')?.click();
                else if (nextDiff === 'hard') document.getElementById('diff-hard')?.click();
            });
        }

        function setMode(mode) {
            perfectLevelsStreak = 0;
            currentMode = mode;
            document.getElementById('tab-color').classList.toggle('active', mode === 'color');
            document.getElementById('tab-shape').classList.toggle('active', mode === 'shape');
            document.getElementById('tab-quantity').classList.toggle('active', mode === 'quantity');
            document.getElementById('tab-size').classList.toggle('active', mode === 'size');
            startNewLevel();
        }

        function setDifficulty(diff) {
            perfectLevelsStreak = 0;
            currentDifficulty = diff;
            document.querySelectorAll('.diff-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`diff-${diff}`).classList.add('active');
            startNewLevel();
        }

        // --- Factory Mode Loop ---
        function startFactoryLoop() {
            if (factoryAnimationId) cancelAnimationFrame(factoryAnimationId);
            activeBeltItems = [];
            factoryLastSpawnTime = performance.now();
            factoryAnimationId = requestAnimationFrame(updateFactory);
        }

        function updateFactory(time) {
            if (!isFactoryMode) return;

            const spawnInterval = currentDifficulty === 'easy' ? 2000 : (currentDifficulty === 'medium' ? 1600 : 1200);
            const speed = currentDifficulty === 'easy' ? 1.5 : (currentDifficulty === 'medium' ? 2.0 : 2.5);

            // Apparition de nouveaux objets
            if (time - factoryLastSpawnTime > spawnInterval && factoryItemsQueue.length > 0) {
                const itemData = factoryItemsQueue.shift();
                spawnItemOnBelt(itemData);
                factoryLastSpawnTime = time;
            }

            // Déplacement des objets
            const beltRect = itemsContainer.getBoundingClientRect();

            for (let i = activeBeltItems.length - 1; i >= 0; i--) {
                const beltItem = activeBeltItems[i];
                const el = document.getElementById(beltItem.id);

                if (!el) {
                    activeBeltItems.splice(i, 1);
                    continue;
                }

                if (el === currentTouchItem || el === selectedItem || el.classList.contains('selected') || (el.style.opacity && parseFloat(el.style.opacity) < 1)) {
                    // Object is currently being dragged or selected, skip moving it
                    continue;
                }

                beltItem.x += speed;
                el.style.left = beltItem.x + 'px';

                // Vérifier si tombé du tapis
                const elRect = el.getBoundingClientRect();
                if (beltItem.x > beltRect.width - 20) { // Un peu avant la fin absolue pour l'effet visuel
                    // Tombé
                    playSound('error');
                    showToast('Objet tombé !', 'error');
                    updateScore(false);

                    // Retirer du tapis et le remettre dans la queue
                    el.remove();
                    activeBeltItems.splice(i, 1);
                    factoryItemsQueue.push(beltItem.data); // Le remettre à la fin
                }
            }

            factoryAnimationId = requestAnimationFrame(updateFactory);
        }

        function spawnItemOnBelt(itemData) {
            const item = createItemElement(itemData);
            item.style.position = 'absolute';
            item.style.left = '-60px'; // Démarrer hors écran à gauche
            itemsContainer.appendChild(item);

            activeBeltItems.push({
                id: itemData.id,
                x: -60,
                data: itemData
            });
            fa.createIcons();
        }

        function getNumBins() {
            if (currentDifficulty === 'easy') return 2;
            if (currentDifficulty === 'medium') return 3;
            if (currentDifficulty === 'hard') return 4;
            return 3;
        }

        function startNewLevel() {
            mistakesInCurrentLevel = 0;
            selectedItem = null;
            itemsContainer.innerHTML = '';
            binsContainer.innerHTML = '';
            if (factoryAnimationId) cancelAnimationFrame(factoryAnimationId);

            const numBins = getNumBins();
            let availableTypes = [];

            if (currentMode === 'color') {
                // Mélanger et prendre N couleurs
                const shuffled = [...COLORS].sort(() => 0.5 - Math.random());
                availableTypes = shuffled.slice(0, numBins);

                // Créer les bacs
                availableTypes.forEach(type => {
                    const bin = document.createElement('div');
                    bin.className = `bin`;
                    bin.dataset.accept = type.id;

                    const label = document.createElement('div');
                    label.className = 'bin-label';

                    const icon = document.createElement('i');
                    icon.setAttribute('data-fa', 'palette');
                    icon.className = `bin-icon color-${type.id}`;

                    label.appendChild(icon);
                    label.appendChild(document.createTextNode(` ${type.name}`));
                    bin.appendChild(label);

                    setupBinEvents(bin);
                    binsContainer.appendChild(bin);
                });
            } else if (currentMode === 'shape') {
                // Mélanger et prendre N formes
                const shuffled = [...SHAPES].sort(() => 0.5 - Math.random());
                availableTypes = shuffled.slice(0, numBins);

                // Créer les bacs
                availableTypes.forEach(type => {
                    const bin = document.createElement('div');
                    bin.className = `bin`;
                    bin.dataset.accept = type.id;

                    const label = document.createElement('div');
                    label.className = 'bin-label';

                    const icon = document.createElement('i');
                    icon.setAttribute('data-fa', type.icon);
                    icon.className = 'bin-icon';

                    label.appendChild(icon);
                    label.appendChild(document.createTextNode(` ${type.name}`));
                    bin.appendChild(label);

                    setupBinEvents(bin);
                    binsContainer.appendChild(bin);
                });
            } else if (currentMode === 'quantity') {
                // Mélanger et prendre N quantités
                const shuffled = [...QUANTITIES].sort(() => 0.5 - Math.random());
                availableTypes = shuffled.slice(0, numBins);
                // Trier les bacs par quantité croissante pour plus de clarté
                availableTypes.sort((a, b) => parseInt(a.id) - parseInt(b.id));

                // Créer les bacs
                availableTypes.forEach(type => {
                    const bin = document.createElement('div');
                    bin.className = `bin`;
                    bin.dataset.accept = type.id;

                    const label = document.createElement('div');
                    label.className = 'bin-label';
                    label.style.fontSize = '24px';
                    label.style.fontWeight = 'bold';
                    label.style.fontFamily = 'monospace';
                    label.textContent = type.name;

                    bin.appendChild(label);
                    setupBinEvents(bin);
                    binsContainer.appendChild(bin);
                });
            } else if (currentMode === 'size') {
                // Mélanger et prendre N tailles
                const shuffled = [...SIZES].sort(() => 0.5 - Math.random());
                availableTypes = shuffled.slice(0, numBins);
                // Trier les bacs par taille croissante pour plus de clarté
                availableTypes.sort((a, b) => a.scale - b.scale);

                // Créer les bacs
                availableTypes.forEach(type => {
                    const bin = document.createElement('div');
                    bin.className = `bin`;
                    bin.dataset.accept = type.id;

                    const label = document.createElement('div');
                    label.className = 'bin-label';
                    label.textContent = type.name;

                    bin.appendChild(label);
                    setupBinEvents(bin);
                    binsContainer.appendChild(bin);
                });
            }

            fa.createIcons();

            // Générer des objets (ex: 2 objets par bac, ou plus en mode usine)
            const numItems = isFactoryMode ? numBins * 4 : numBins * 2;
            let items = [];
            for (let i = 0; i < numItems; i++) {
                // Choisir un type valide parmi ceux des bacs
                const correctType = availableTypes[i % numBins];

                // Assigner la forme ou couleur opposée aléatoirement pour varier l'apparence
                let itemColor, itemShape, itemQuantity, itemScale;
                itemColor = COLORS[Math.floor(Math.random() * COLORS.length)];
                itemShape = SHAPES[Math.floor(Math.random() * SHAPES.length)];

                if (currentMode === 'color') {
                    itemColor = correctType;
                } else if (currentMode === 'shape') {
                    itemShape = correctType;
                } else if (currentMode === 'quantity') {
                    itemQuantity = correctType;
                } else if (currentMode === 'size') {
                    itemScale = correctType;
                }

                items.push({ id: `item-${i}`, color: itemColor, shape: itemShape, quantity: itemQuantity, scaleObj: itemScale, typeId: correctType.id });
            }

            // Mélanger les objets
            items.sort(() => 0.5 - Math.random());

            if (isFactoryMode) {
                factoryItemsQueue = items;
                startFactoryLoop();
            } else {
                items.forEach(itemData => {
                    const item = createItemElement(itemData);
                    itemsContainer.appendChild(item);
                });
                fa.createIcons();
            }
        }

        function createItemElement(itemData) {
            const item = document.createElement('div');
            item.className = 'item';
            item.id = itemData.id;
            item.dataset.type = itemData.typeId;
            item.draggable = true;

            // Apparence de l'objet
            const icon = document.createElement('i');
            icon.className = 'shape-icon';
            icon.style.color = itemData.color.hex;

            if (currentMode === 'quantity') {
                icon.setAttribute('data-fa', itemData.quantity.icon);
                icon.style.width = '44px';
                icon.style.height = '44px';
            } else if (currentMode === 'size') {
                icon.setAttribute('data-fa', itemData.shape.icon);
                icon.style.fill = itemData.color.hex;
                icon.style.transform = `scale(${itemData.scaleObj.scale})`;
            } else {
                icon.setAttribute('data-fa', itemData.shape.icon);
                icon.style.fill = itemData.color.hex;
            }
            item.appendChild(icon);

            setupItemEvents(item);
            return item;
        }

        // --- Touch Events Support ---
        let touchOffsetX = 0;
        let touchOffsetY = 0;
        let activeClone = null;
        let currentTouchItem = null;
        let touchHasMoved = false;

        function handleTouchStart(e) {
            const touch = e.touches[0];
            currentTouchItem = this;
            touchHasMoved = false;

            const rect = this.getBoundingClientRect();
            touchOffsetX = touch.clientX - rect.left;
            touchOffsetY = touch.clientY - rect.top;

            // Allow tap events but track touch coords
            // e.preventDefault(); is removed to allow native click sequence
            // but we might need to stop propagation depending on swipe.js conflicts
            // Not preventing default here is the right way

        }

        function handleTouchMove(e) {
            if (!currentTouchItem) return;
            touchHasMoved = true;

            if (e.cancelable) e.preventDefault();
            e.stopPropagation();

            const touch = e.touches[0];

            if (!activeClone) {
                activeClone = currentTouchItem.cloneNode(true);
                activeClone.style.position = 'fixed';
                activeClone.style.opacity = '0.8';
                activeClone.style.zIndex = '1000';
                activeClone.style.pointerEvents = 'none';
                activeClone.style.margin = '0';
                document.body.appendChild(activeClone);
                currentTouchItem.style.opacity = '0.5';
                selectItem(currentTouchItem);
            }

            activeClone.style.left = (touch.clientX - touchOffsetX) + 'px';
            activeClone.style.top = (touch.clientY - touchOffsetY) + 'px';

            const elemBelow = document.elementFromPoint(touch.clientX, touch.clientY);
            document.querySelectorAll('.bin').forEach(b => b.classList.remove('drag-over'));
            if (elemBelow) {
                const binBelow = elemBelow.closest('.bin');
                if (binBelow) {
                    binBelow.classList.add('drag-over');
                }
            }
        }

        function handleTouchEnd(e) {
            if (!currentTouchItem) return;
            // Only stop propagation if we actually dragged, otherwise we might block click
            if (touchHasMoved) {
                e.stopPropagation();
            }

            if (touchHasMoved && activeClone) {
                if (e.cancelable) e.preventDefault();
                const touch = e.changedTouches[0];
                const elemBelow = document.elementFromPoint(touch.clientX, touch.clientY);

                document.querySelectorAll('.bin').forEach(b => b.classList.remove('drag-over'));

                if (elemBelow) {
                    const binBelow = elemBelow.closest('.bin');
                    if (binBelow) {
                        handleDrop(currentTouchItem, binBelow);
                    }
                }

                activeClone.remove();
                activeClone = null;
            }

            if (currentTouchItem && currentTouchItem.style) {
                currentTouchItem.style.opacity = '1';
            }

            currentTouchItem = null;
            touchHasMoved = false;
        }

        // --- Drag & Drop et Click Events ---


        function setupItemEvents(item) {
            item.addEventListener('dragstart', (e) => {
                isDragged = true;
                e.dataTransfer.setData('text/plain', item.id);
                item.style.opacity = '0.5';
                selectItem(item);
            });

            item.addEventListener('dragend', () => {
                isDragged = false;
                item.style.opacity = '1';
            });

            item.addEventListener('click', () => {
                selectItem(item);
                playSound('click');
            });

            item.addEventListener('touchstart', handleTouchStart, {passive: false});
            item.addEventListener('touchmove', handleTouchMove, {passive: false});
            item.addEventListener('touchend', handleTouchEnd);
            item.addEventListener('touchcancel', handleTouchEnd);
        }

        function selectItem(item) {
            if (selectedItem) {
                selectedItem.classList.remove('selected');
            }
            selectedItem = item;
            selectedItem.classList.add('selected');
        }

        function setupBinEvents(bin) {
            bin.addEventListener('dragover', (e) => {
                e.preventDefault();
                bin.classList.add('drag-over');
            });

            bin.addEventListener('dragleave', () => {
                bin.classList.remove('drag-over');
            });

            bin.addEventListener('drop', (e) => {
                e.preventDefault();
                bin.classList.remove('drag-over');
                const itemId = e.dataTransfer.getData('text/plain');
                const item = document.getElementById(itemId);
                if (item) {
                    handleDrop(item, bin);
                }
            });

            bin.addEventListener('click', () => {
                if (selectedItem) {
                    handleDrop(selectedItem, bin);
                }
            });
        }

        function handleDrop(item, bin) {
            const itemType = item.dataset.type;
            const binAccept = bin.dataset.accept;

            if (itemType === binAccept) {
                // Correct !
                playSound('success');
                showToast('Bravo !', 'success');

                // Si en mode factory, retirer des objets actifs du tapis et réinitialiser son style
                if (isFactoryMode) {
                    const activeIndex = activeBeltItems.findIndex(bItem => bItem.id === item.id);
                    if (activeIndex !== -1) {
                        activeBeltItems.splice(activeIndex, 1);
                    }
                    item.style.position = 'static';
                    item.style.left = 'auto';
                    item.style.transform = 'none';
                }

                bin.appendChild(item);
                item.draggable = false;
                item.classList.remove('selected');
                item.style.cursor = 'default';
                item.style.pointerEvents = 'none';
                selectedItem = null;
                isDragged = false;

                updateScore(true);

                // Vérifier si niveau terminé
                if ((!isFactoryMode && itemsContainer.children.length === 0) ||
                    (isFactoryMode && activeBeltItems.length === 0 && factoryItemsQueue.length === 0)) {

                    if (mistakesInCurrentLevel === 0) {
                        perfectLevelsStreak++;
                        if (perfectLevelsStreak >= 2) {
                            perfectLevelsStreak = 0;
                            const upgrades = {
                                'easy': 'medium',
                                'medium': 'hard'
                            };
                            const nextDiff = upgrades[currentDifficulty];
                            if (nextDiff && ScoreManager.isDifficultySupported(nextDiff)) {
                                setTimeout(() => {
                                    ScoreManager.showAdaptivePopup(nextDiff, ScoreManager.DIFF_LABELS[nextDiff] || nextDiff, currentMode);
                                }, 1500);
                            }
                        }
                    } else {
                        perfectLevelsStreak = 0;
                    }

                    setTimeout(() => {
                        launchConfetti();
                        playSound('win');
                        startNewLevel();
                    }, 1000);
                }
            } else {
                // Incorrect
                mistakesInCurrentLevel++;
                playSound('error');
                showToast('Oups, essaie un autre bac !', 'error');
                item.classList.remove('selected');
                selectedItem = null;
                isDragged = false;
                updateScore(false);
            }
        }


        function updateScore(correct) {
            if (correct) {
                globalCorrect++;
                globalStreak++;
                if (globalStreak > globalBest) globalBest = globalStreak;
                ScoreManager.addSuccess(currentMode, currentDifficulty, 0);
            } else {
                globalStreak = 0;
                ScoreManager.addMistake(currentMode, currentDifficulty);
            }
            document.getElementById('global-correct').textContent = globalCorrect;
            document.getElementById('global-streak').textContent = globalStreak;
        }

        window.addEventListener('load', init);
    </script>
    <script src="../../assets/js/swipe.js"></script>
    <script src="../../assets/js/toast.js"></script>
    <script src="../../assets/js/theme.js"></script>
    <script src="../../assets/js/url-params.js"></script>
</body>
