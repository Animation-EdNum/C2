<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Machine à chiffrer</title>
    <link rel="stylesheet" href="../../css/shared.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        textarea { width: 300px; height: 100px; margin: 10px 0; font-size: 16px; padding: 10px; border-radius: 8px; }
        .controls { margin: 20px 0; display: flex; gap: 10px; align-items: center; }
    </style>
</head>
<body>
    <h1>Machine à chiffrer</h1>
    <textarea id="input" placeholder="Message clair..."></textarea>
    <div class="controls">
        <label>Décalage: <span id="offset-val">0</span></label>
        <input type="range" id="offset" min="-25" max="25" value="0">
    </div>
    <textarea id="output" readonly placeholder="Message chiffré..."></textarea>
    <script>
        const input = document.getElementById('input');
        const output = document.getElementById('output');
        const offset = document.getElementById('offset');
        const offsetVal = document.getElementById('offset-val');

        function cipher() {
            const text = input.value.toUpperCase();
            const shift = parseInt(offset.value);
            offsetVal.textContent = shift;
            let result = '';
            for (let i = 0; i < text.length; i++) {
                const c = text.charCodeAt(i);
                if (c >= 65 && c <= 90) {
                    result += String.fromCharCode(((c - 65 + shift + 26) % 26) + 65);
                } else {
                    result += text[i];
                }
            }
            output.value = result;
        }

        input.addEventListener('input', cipher);
        offset.addEventListener('input', cipher);
    </script>
</body>
</html>
