<!DOCTYPE html>
<html lang="fr">

<head>
    <link rel="root" href="../../">
    <meta charset="UTF-8">
    <title>💻 Pseudo-code - Le Distributeur</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../assets/css/tokens.css">
    <link rel="stylesheet" href="../../assets/css/base.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <link rel="stylesheet" href="../../assets/css/utilities.css">
    <style>
        body>header,
        body>.container {
            animation: fadeInCascade 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        :root {
            --bg-gradient-start: #0891b2;
            --bg-gradient-end: #0e7490;
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(8, 145, 178, 0.2);
            --container-bg: rgba(255, 255, 255, 0.9);
            --text-main: #164e63;
            --text-secondary: #0e7490;
            --text-muted: #06b6d4;
            --accent: #0891b2;
            --accent-dark: #0e7490;
            --instructions-bg: #ecfeff;
            --success: #10b981;
            --error: #ef4444;
            --shadow-color: rgba(8, 145, 178, 0.15);
            --code-bg: #1e1e3f;
            --code-text: #f8fafc;
        }

        body.dark {
            --bg-gradient-start: #164e63;
            --bg-gradient-end: #083344;
            --card-bg: rgba(30, 41, 59, 0.75);
            --container-bg: rgba(15, 23, 42, 0.8);
            --text-main: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --accent: #22d3ee;
            --accent-dark: #06b6d4;
            --instructions-bg: #1e293b;
            --success: #34d399;
            --error: #f87171;
            --shadow-color: rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-main);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: var(--container-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 20px 60px var(--shadow-color);
        }

        h1 {
            text-align: center;
            color: var(--accent);
            margin-bottom: 5px;
            font-size: 28px;
        }

        .difficulty-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .diff-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 2px solid var(--accent);
            background: transparent;
            color: var(--text-main);
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .diff-btn.active {
            background: var(--accent);
            color: white;
        }

        .workspace {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 25px;
        }

        @media (max-width: 900px) {
            .workspace {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .panel-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 10px;
        }

        .editor-container {
            background: var(--code-bg);
            border-radius: 12px;
            padding: 15px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 15px;
            color: var(--code-text);
            min-height: 400px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow-y: auto;
            max-height: 600px;
        }

        .code-line {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid transparent;
            flex-wrap: wrap;
            transition: all 0.2s;
        }

        .code-line.active {
            background: rgba(99, 102, 241, 0.3);
            border-color: rgba(99, 102, 241, 0.6);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.4);
        }

        .line-number {
            color: #6366f1;
            opacity: 0.6;
            width: 25px;
            text-align: right;
            user-select: none;
            flex-shrink: 0;
        }

        .code-indent-1 {
            margin-left: 20px;
        }

        .code-indent-2 {
            margin-left: 40px;
        }

        .code-indent-3 {
            margin-left: 60px;
        }

        .code-indent-4 {
            margin-left: 80px;
        }

        .keyword {
            color: #f43f5e;
            font-weight: 700;
        }

        .variable-name {
            color: #38bdf8;
            font-weight: 600;
        }

        .code-selector {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 4px;
            color: inherit;
            padding: 2px 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: inherit;
        }

        .code-selector option {
            background-color: #fff;
            color: #000;
        }

        body.dark .code-selector option {
            background-color: #1e1e3f;
            color: #fff;
        }

        /* HARDWARE UI */
        .hardware-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: flex-end;
            padding: 10px;
        }

        .distributeur-svg {
            width: 260px;
            background: #334155;
            padding: 15px;
            border-radius: 12px;
            border: 4px solid #1e293b;
            position: relative;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        .dist-screen {
            background: #0ea5e9;
            color: #fff;
            font-family: monospace;
            font-size: 13px;
            padding: 10px;
            border-radius: 4px;
            height: 60px;
            margin-bottom: 15px;
            border: inset 3px #0284c7;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .dist-screen-sub {
            font-size: 10px;
            opacity: 0.8;
            margin-top: 4px;
        }

        .dist-btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }

        .dist-btn {
            background: #94a3b8;
            border: 2px solid #64748b;
            border-radius: 4px;
            padding: 10px 5px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            transition: 0.2s;
            color: #0f172a;
        }

        .dist-btn:hover:not(:disabled) {
            background: #cbd5e1;
            border-color: #94a3b8;
        }

        .dist-btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        .dist-btn.active-btn {
            background: #38bdf8;
            border-color: #0284c7;
            color: white;
        }

        .dist-slots {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: 15px;
            border-top: 2px dashed #475569;
            padding-top: 15px;
        }

        .coin-slot,
        .ticket-slot {
            width: 45%;
            height: 35px;
            background: #0f172a;
            border-radius: 4px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #64748b;
            font-size: 11px;
            border: inset 2px #000;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            padding: 0 5px;
        }

        .coin-slot:hover {
            border-color: #f1c40f;
            color: #f1c40f;
            box-shadow: 0 0 10px rgba(241, 196, 15, 0.4);
        }

        .coin-slot:active {
            transform: scale(0.95);
        }

        .ticket-out {
            position: absolute;
            bottom: 0;
            width: 80%;
            height: 50px;
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            z-index: 10;
            animation: slideOut 1s forwards;
            font-size: 10px;
            color: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.3);
        }

        @keyframes slideOut {
            from {
                transform: translateY(40px);
                opacity: 0;
            }

            to {
                transform: translateY(30px);
                opacity: 1;
            }
        }

        /* CUSTOMER SVG */
        .customer-svg {
            width: 110px;
            transition: 0.3s;
            margin-bottom: 20px;
        }

        .customer-face {
            fill: #fde047;
            transition: 0.3s;
        }

        .customer-eye {
            fill: #334155;
        }

        .customer-mouth {
            stroke: #334155;
            stroke-width: 5;
            stroke-linecap: round;
            fill: none;
            transition: 0.3s;
        }

        .customer-eyebrow {
            stroke: transparent;
            stroke-width: 5;
            stroke-linecap: round;
            transition: 0.3s;
        }

        .customer-svg.angry .customer-face {
            fill: #ef4444;
        }

        .customer-svg.angry .customer-mouth {
            d: path("M 30 75 Q 50 60 70 75");
        }

        .customer-svg.angry .customer-eyebrow {
            stroke: #334155;
        }

        .customer-svg.happy .customer-face {
            fill: #4ade80;
        }

        .customer-svg.happy .customer-mouth {
            d: path("M 30 65 Q 50 85 70 65");
        }

        /* CONTROLS */
        .controls-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            box-shadow: 0 4px 16px var(--shadow-color);
            flex-wrap: wrap;
            gap: 15px;
        }

        .btn {
            padding: 10px 18px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-success {
            background: var(--success);
        }

        .btn-primary {
            background: #3b82f6;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--text-muted);
            color: var(--text-main);
        }

        .target-box {
            background: var(--instructions-bg);
            border-left: 4px solid var(--accent);
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .bug-marker {
            background: rgba(239, 68, 68, 0.15);
            border: 1px dashed var(--error);
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <div class="container" id="main-content">
        <header class="app-header"
            style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px;">
            <h1><span style="font-size:1.2em">🐛</span> Chasse aux Bugs : Distributeur</h1>
        </header>

        <main>
            <div class="tabs" style="display:flex; gap:10px; margin-bottom:20px; overflow-x:auto; padding-bottom:10px;">
                <button class="btn btn-outline" disabled style="opacity:0.5; cursor:not-allowed;">1. Variables</button>
                <button class="btn btn-outline" disabled style="opacity:0.5; cursor:not-allowed;">2. Conditions</button>
                <button class="btn btn-outline" disabled style="opacity:0.5; cursor:not-allowed;">3. Boucles</button>
                <button class="btn btn-primary">4. Distributeur (Débogage)</button>
            </div>

            <div class="difficulty-bar">
                <button class="diff-btn active" id="diff-easy">Niveau 1 (Base)</button>
                <button class="diff-btn" id="diff-hard">Niveau 2 (Avancé)</button>
            </div>

            <div class="workspace">
                <section class="panel">
                    <h2 class="panel-title">📝 Code du logiciel (Software)</h2>
                    <div class="target-box" id="level-target"></div>
                    <div class="editor-container" id="editor-lines"></div>
                </section>

                <section class="panel">
                    <h2 class="panel-title">🕹️ Matériel (Hardware)</h2>
                    <div class="render-container" id="render-area">
                    </div>
                </section>
            </div>

            <div class="controls-panel">
                <div style="display:flex; gap:10px; flex-wrap:wrap;">
                    <button class="btn btn-success" id="btn-play">▶ Lancer</button>
                    <button class="btn btn-primary" id="btn-step">⏭ Pas-à-pas</button>
                    <button class="btn btn-outline" id="btn-reset">🔄 Réinitialiser</button>
                </div>
                <div class="execution-info" id="execution-msg" style="font-weight:bold; color:var(--accent);">Prêt</div>
            </div>
        </main>
    </div>

    <script>
        // --- ETAT GLOBAL ---
        let currentDifficulty = 'easy'; // 'easy' ou 'hard'
        let lines = [];
        let currentLineIdx = -1;
        let executionInterval = null;
        let executionState = 'idle';
        let isWaitingForInput = false;

        let hardwareState = {
            screen_text: "CHOISIR TRAJET",
            sub_text: "",
            montant_introduit: 0,
            selection: null,
            payment_method: null, // 'carte', 'nfc', 'cash'
            pin_correct: null,
            ticket_printed: false,
            customer_status: 'neutral'
        };

        // --- MISSIONS ---
        const MISSIONS = {
            'easy': {
                targetText: "<strong>Fiche 209 (Base) :</strong> Une erreur s'est glissée pour le tarif Enfant. Simule l'achat d'un billet enfant et corrige l'erreur de code dans le menu déroulant !",
                setup: () => {
                    lines = [
                        { type: 'keyword', val: 'répéter indéfiniment' },
                        { type: 'wait_input', indent: 1, event: 'selection', val: 'attendre la sélection du trajet' },
                        { type: 'text', indent: 1, val: 'si la touche trajet court/adulte est sélectionnée,' },
                        { type: 'cmd', indent: 2, val: 'alors afficher Fr. 2.30' },
                        { type: 'wait_input', indent: 2, event: 'pay_230', val: 'attendre paiement >= 2.30' },
                        { type: 'text', indent: 2, val: 'si le montant introduit ≥ Fr. 2.30,' },
                        { type: 'cmd', indent: 3, val: 'alors imprimer le billet et rendre la monnaie' },
                        { type: 'text', indent: 1, val: 'si la touche trajet court/enfant est sélectionnée,' },
                        { type: 'cmd', indent: 2, val: 'alors afficher Fr. 1.80' },
                        { type: 'wait_input', indent: 2, event: 'pay_180', val: 'attendre paiement >= 1.80' },
                        { type: 'text', indent: 2, val: 'si le montant introduit ≥ Fr. 1.80,' },
                        { type: 'fix_dropdown', indent: 3, prefix: 'alors ', options: ['(Omission / Rien)', 'afficher "Erreur"', 'imprimer le billet et rendre la monnaie'], selected: '(Omission / Rien)', correct: 'imprimer le billet et rendre la monnaie' }
                    ];
                }
            },
            'hard': {
                targetText: "<strong>Fiche Avancée :</strong> Le client utilise le <strong>Sans Contact</strong> (🛜), mais rien ne sort ! Trouve le bloc 'sans contact', déroule le programme et corrige l'erreur.",
                setup: () => {
                    lines = [
                        { type: 'keyword', val: 'répéter indéfiniment' },
                        { type: 'wait_input', indent: 1, event: 'selection', val: 'attendre la sélection du trajet' },
                        { type: 'text', indent: 1, val: 'si les touches trajet court / adulte sont sélectionnées, alors' },
                        { type: 'cmd', indent: 2, val: 'afficher 2.30 francs' },
                        { type: 'wait_input', indent: 2, event: 'payment_method', val: 'attendre un moyen de paiement' },

                        { type: 'text', indent: 2, val: 'si la carte de crédit est introduite, alors' },
                        { type: 'cmd', indent: 3, val: 'demander le code PIN' },
                        { type: 'wait_input', indent: 3, event: 'pin_ok', val: 'attendre jusqu\'à ce que la touche «OK» soit pressée' },
                        { type: 'text', indent: 3, val: 'si le code PIN est correct, alors' },
                        { type: 'cmd', indent: 4, val: 'Comptabiliser 2.30 francs' },
                        { type: 'cmd', indent: 4, val: 'rendre la carte' },
                        { type: 'cmd', indent: 4, val: 'imprimer le billet' },
                        { type: 'cmd', indent: 4, val: 'terminer le processus' },
                        { type: 'text', indent: 3, val: 'si le code PIN est faux, alors' },
                        { type: 'cmd', indent: 4, val: 'afficher «Mauvais code PIN»' },
                        { type: 'cmd', indent: 4, val: 'rendre la carte' },
                        { type: 'cmd', indent: 4, val: 'terminer le processus' },

                        { type: 'text', indent: 2, val: 'si la carte est placée sur le symbole sans contact, alors' },
                        { type: 'cmd', indent: 3, val: 'comptabiliser 2.30 francs' },
                        // BUG ICI
                        { type: 'fix_dropdown', indent: 3, prefix: '', options: ['(Omission / Rien)', 'afficher "Erreur"', 'imprimer le billet'], selected: '(Omission / Rien)', correct: 'imprimer le billet' },
                        { type: 'cmd', indent: 3, val: 'terminer le processus' },

                        { type: 'text', indent: 2, val: 'si un montant est introduit, alors' },
                        { type: 'cmd', indent: 3, val: 'afficher 0 francs' },
                        { type: 'wait_input', indent: 3, event: 'pay_cash_loop', val: 'répéter jusqu\'à ce que montant inséré >= 2.30 francs' },
                        { type: 'cmd', indent: 4, val: 'déterminer la valeur du montant introduit' },
                        { type: 'cmd', indent: 4, val: 'afficher la valeur du montant introduit' },
                        { type: 'cmd', indent: 3, val: 'imprimer le billet' },
                        { type: 'cmd', indent: 3, val: 'rendre montant inséré - 2.30 francs' },
                        { type: 'cmd', indent: 3, val: 'terminer le processus' }
                    ];
                }
            }
        };

        function initLevel() {
            hardwareState = { screen_text: "CHOISIR TRAJET", sub_text: "", montant_introduit: 0, selection: null, payment_method: null, pin_correct: null, ticket_printed: false, customer_status: 'neutral' };
            MISSIONS[currentDifficulty].setup();
            document.getElementById('level-target').innerHTML = MISSIONS[currentDifficulty].targetText;
            renderPseudocode();
            renderVisualizer();
            resetExecution();
        }

        // --- INTERFACE ---
        function renderPseudocode() {
            const container = document.getElementById('editor-lines');
            container.replaceChildren();

            lines.forEach((line, idx) => {
                const lineDiv = document.createElement('div');
                lineDiv.className = `code-line code-indent-${line.indent || 0}`;
                lineDiv.id = `line-${idx}`;

                const numSpan = document.createElement('span');
                numSpan.className = 'line-number';
                numSpan.textContent = idx + 1;
                lineDiv.appendChild(numSpan);

                if (line.type === 'keyword' || line.type === 'cmd') {
                    const span = document.createElement('span');
                    span.className = line.type === 'keyword' ? 'keyword' : 'variable-name';
                    span.textContent = line.val;
                    lineDiv.appendChild(span);
                } else if (line.type === 'text') {
                    const span = document.createElement('span');
                    span.textContent = line.val;
                    lineDiv.appendChild(span);
                } else if (line.type === 'wait_input') {
                    const span = document.createElement('span');
                    span.style.color = '#f59e0b';
                    span.style.fontStyle = 'italic';
                    span.textContent = '⏳ ' + line.val;
                    lineDiv.appendChild(span);
                } else if (line.type === 'fix_dropdown') {
                    if (line.prefix) {
                        const kw = document.createElement('span');
                        kw.className = 'keyword';
                        kw.textContent = line.prefix;
                        lineDiv.appendChild(kw);
                    }

                    const select = document.createElement('select');
                    select.className = 'code-selector bug-marker';
                    line.options.forEach(opt => {
                        const option = document.createElement('option');
                        option.value = opt; option.textContent = opt;
                        if (opt === line.selected) option.selected = true;
                        select.appendChild(option);
                    });
                    select.addEventListener('change', (e) => { line.selected = e.target.value; });
                    lineDiv.appendChild(select);
                }
                container.appendChild(lineDiv);
            });
        }

        function renderVisualizer() {
            const area = document.getElementById('render-area');
            let isHard = currentDifficulty === 'hard';

            area.innerHTML = `
                <div class="hardware-container">
                    <svg class="customer-svg ${hardwareState.customer_status}" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="45" class="customer-face" />
                        <circle cx="35" cy="40" r="5" class="customer-eye" />
                        <circle cx="65" cy="40" r="5" class="customer-eye" />
                        <path d="M 25 30 L 45 35" class="customer-eyebrow"/>
                        <path d="M 75 30 L 55 35" class="customer-eyebrow"/>
                        <path d="M 35 65 Q 50 65 65 65" class="customer-mouth"/>
                    </svg>

                    <div class="distributeur-svg">
                        <div class="dist-screen">
                            <div id="hw-screen">${hardwareState.screen_text}</div>
                            <div id="hw-subtext" class="dist-screen-sub">${hardwareState.sub_text}</div>
                        </div>
                        
                        <div class="dist-btn-group" id="group-select">
                            <button class="dist-btn" id="btn-adulte">🧑 Adulte</button>
                            <button class="dist-btn" id="btn-enfant" ${isHard ? 'disabled style="opacity:0.3"' : ''}>👧 Enfant</button>
                        </div>
                        
                        <div class="dist-btn-group" id="group-payments" style="display: ${isHard ? 'grid' : 'none'}; grid-template-columns: 1fr 1fr;">
                            <button class="dist-btn" id="btn-carte">💳 Carte</button>
                            <button class="dist-btn" id="btn-nfc">🛜 Sans Contact</button>
                        </div>

                        <div class="dist-btn-group" id="group-pin" style="display: none; grid-template-columns: 1fr 1fr;">
                            <button class="dist-btn" id="btn-pin-ok" style="background:#10b981; color:white; border-color:#059669;">✔ OK</button>
                            <button class="dist-btn" id="btn-pin-err" style="background:#ef4444; color:white; border-color:#b91c1c;">✖ Faux</button>
                        </div>
                        
                        <div class="dist-slots">
                            <div class="ticket-slot" id="hw-ticket-slot">🎫 Billet</div>
                            <div class="coin-slot" id="btn-coin" style="font-size:10px;">🪙 Cash (+2.00)</div>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('btn-adulte').addEventListener('click', () => triggerHardwareEvent('adulte'));
            document.getElementById('btn-enfant').addEventListener('click', () => triggerHardwareEvent('enfant'));
            document.getElementById('btn-coin').addEventListener('click', () => triggerHardwareEvent('cash'));
            if (isHard) {
                document.getElementById('btn-carte').addEventListener('click', () => triggerHardwareEvent('carte'));
                document.getElementById('btn-nfc').addEventListener('click', () => triggerHardwareEvent('nfc'));
                document.getElementById('btn-pin-ok').addEventListener('click', () => triggerHardwareEvent('pin_true'));
                document.getElementById('btn-pin-err').addEventListener('click', () => triggerHardwareEvent('pin_false'));
            }
        }

        function updateHardwareUI() {
            document.getElementById('hw-screen').textContent = hardwareState.screen_text;
            document.getElementById('hw-subtext').textContent = hardwareState.sub_text;
            document.querySelector('.customer-svg').className = `customer-svg ${hardwareState.customer_status}`;

            document.getElementById('btn-adulte').classList.toggle('active-btn', hardwareState.selection === 'adulte');
            if (currentDifficulty === 'easy') {
                document.getElementById('btn-enfant').classList.toggle('active-btn', hardwareState.selection === 'enfant');
            }

            if (currentDifficulty === 'hard') {
                document.getElementById('btn-carte').classList.toggle('active-btn', hardwareState.payment_method === 'carte');
                document.getElementById('btn-nfc').classList.toggle('active-btn', hardwareState.payment_method === 'nfc');

                // Affiche PIN seulement si on est sur le point d'entrer le PIN
                if (isWaitingForInput && lines[currentLineIdx] && lines[currentLineIdx].event === 'pin_ok') {
                    document.getElementById('group-payments').style.display = 'none';
                    document.getElementById('group-pin').style.display = 'grid';
                } else {
                    document.getElementById('group-payments').style.display = 'grid';
                    document.getElementById('group-pin').style.display = 'none';
                }
            }

            if (hardwareState.ticket_printed && !document.querySelector('.ticket-out')) {
                const slot = document.getElementById('hw-ticket-slot');
                const t = document.createElement('div');
                t.className = 'ticket-out';
                t.textContent = hardwareState.selection === 'adulte' ? "CFF - ADULTE" : "CFF - ENFANT";
                slot.appendChild(t);
            }
        }

        // --- EVENTS HARDWARE ---
        function triggerHardwareEvent(action) {
            if (executionState === 'idle') startExecution();

            if (action === 'adulte' || action === 'enfant') {
                if (hardwareState.selection === null) hardwareState.selection = action;
                if (isWaitingForInput && lines[currentLineIdx].event === 'selection') resumeExecution();
            }
            else if (action === 'carte' || action === 'nfc' || action === 'cash') {
                // Seulement si on attendait le moyen de paiement (Ligne 4 en avancé)
                if (isWaitingForInput && lines[currentLineIdx].event === 'payment_method') {
                    hardwareState.payment_method = action;
                    if (action === 'cash') hardwareState.montant_introduit += 2.00;
                    resumeExecution();
                } else if (action === 'cash' && isWaitingForInput && lines[currentLineIdx].event && lines[currentLineIdx].event.startsWith('pay_')) {
                    // Base mode cash input or loop input
                    hardwareState.montant_introduit += 2.00;
                    hardwareState.sub_text = `Payé: ${hardwareState.montant_introduit.toFixed(2)}`;

                    if (lines[currentLineIdx].event === 'pay_230' && hardwareState.montant_introduit >= 2.30) resumeExecution();
                    if (lines[currentLineIdx].event === 'pay_180' && hardwareState.montant_introduit >= 1.80) resumeExecution();
                    if (lines[currentLineIdx].event === 'pay_cash_loop') resumeExecution(); // loop condition handled in runStep
                }
            }
            else if (action === 'pin_true' || action === 'pin_false') {
                if (isWaitingForInput && lines[currentLineIdx].event === 'pin_ok') {
                    hardwareState.pin_correct = (action === 'pin_true');
                    resumeExecution();
                }
            }
            updateHardwareUI();
        }

        // --- MOTEUR ASYNCHRONE ---
        function resetExecution() {
            if (executionInterval) clearInterval(executionInterval);
            executionInterval = null;
            executionState = 'idle';
            currentLineIdx = -1;
            isWaitingForInput = false;

            document.querySelectorAll('.code-line').forEach(el => el.classList.remove('active'));
            hardwareState = { screen_text: "CHOISIR TRAJET", sub_text: "", montant_introduit: 0, selection: null, payment_method: null, pin_correct: null, ticket_printed: false, customer_status: 'neutral' };
            renderVisualizer();

            document.getElementById('execution-msg').textContent = 'Prêt';
            document.getElementById('execution-msg').style.color = 'var(--accent)';
            document.getElementById('btn-play').innerHTML = '▶ Lancer';
            document.getElementById('btn-play').className = 'btn btn-success';
        }

        function startExecution() {
            if (executionState === 'running') { pauseExecution(); return; }
            executionState = 'running';
            document.getElementById('btn-play').innerHTML = '⏸ Pause';
            document.getElementById('btn-play').className = 'btn btn-outline';
            document.getElementById('execution-msg').textContent = 'Exécution en cours...';
            document.getElementById('execution-msg').style.color = 'var(--text-main)';

            if (executionInterval) clearInterval(executionInterval);
            executionInterval = setInterval(runStep, 800);
        }

        function pauseExecution() {
            executionState = 'paused';
            document.getElementById('btn-play').innerHTML = '▶ Reprendre';
            document.getElementById('btn-play').className = 'btn btn-success';
            if (executionInterval) clearInterval(executionInterval);
        }

        function resumeExecution() {
            isWaitingForInput = false;
            runStep();
        }

        function runStep() {
            if (isWaitingForInput) return;

            currentLineIdx++;
            document.querySelectorAll('.code-line').forEach(el => el.classList.remove('active'));

            if (currentLineIdx >= lines.length) {
                finishExecution();
                return;
            }

            const line = lines[currentLineIdx];
            const activeLine = document.getElementById(`line-${currentLineIdx}`);
            if (activeLine) {
                activeLine.classList.add('active');
                activeLine.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            const text = line.val || '';

            // --- EVALUATION DES CONDITIONS ET SAUTS (GOTO) ---
            if (text.includes('adulte est sélectionnée')) {
                if (hardwareState.selection !== 'adulte') {
                    let nextIdx = lines.findIndex((l, i) => i > currentLineIdx && l.val && l.val.includes('enfant est sélectionnée'));
                    if (nextIdx !== -1) currentLineIdx = nextIdx - 1;
                    else currentLineIdx = lines.length; // Fin du programme si pas d'enfant
                }
            }
            else if (text.includes('enfant est sélectionnée')) {
                if (hardwareState.selection !== 'enfant') currentLineIdx = lines.length;
            }
            // Sauts du Mode Avancé
            else if (text.includes('carte de crédit est introduite')) {
                if (hardwareState.payment_method !== 'carte') {
                    currentLineIdx = lines.findIndex((l, i) => i > currentLineIdx && l.val && l.val.includes('symbole sans contact')) - 1;
                }
            }
            else if (text.includes('si le code PIN est correct')) {
                if (!hardwareState.pin_correct) {
                    currentLineIdx = lines.findIndex((l, i) => i > currentLineIdx && l.val && l.val.includes('si le code PIN est faux')) - 1;
                }
            }
            else if (text.includes('si le code PIN est faux')) {
                if (hardwareState.pin_correct) currentLineIdx = lines.length; // ne devrait pas arriver vu le saut "terminer" précédent
            }
            else if (text.includes('symbole sans contact')) {
                if (hardwareState.payment_method !== 'nfc') {
                    currentLineIdx = lines.findIndex((l, i) => i > currentLineIdx && l.val && l.val.includes('montant est introduit')) - 1;
                }
            }
            else if (text.includes('montant est introduit')) {
                if (hardwareState.payment_method !== 'cash') {
                    currentLineIdx = lines.length;
                }
            }
            else if (text.includes('terminer le processus')) {
                currentLineIdx = lines.length; // Sortie forcée du programme
            }

            // --- ACTIONS ET ATTENTES ---
            if (line.type === 'wait_input') {
                isWaitingForInput = true;
                if (line.event === 'selection') {
                    document.getElementById('execution-msg').textContent = '⏳ En attente du choix du passager...';
                } else if (line.event === 'payment_method') {
                    document.getElementById('execution-msg').textContent = '⏳ En attente de paiement (Carte, Sans contact ou Cash)...';
                    hardwareState.screen_text = "PAIEMENT S.V.P";
                } else if (line.event === 'pin_ok') {
                    document.getElementById('execution-msg').textContent = '⏳ En attente du code PIN...';
                } else {
                    document.getElementById('execution-msg').textContent = '⏳ En attente de la monnaie...';
                }

                // Résolution immédiate si condition déjà remplie
                if (line.event === 'pay_230' && hardwareState.montant_introduit >= 2.30) isWaitingForInput = false;
                if (line.event === 'pay_180' && hardwareState.montant_introduit >= 1.80) isWaitingForInput = false;
                if (line.event === 'pay_cash_loop') {
                    if (hardwareState.montant_introduit >= 2.30) isWaitingForInput = false; // Sortie de boucle
                    else {
                        // Boucle active
                        hardwareState.screen_text = "INSERER MONNAIE";
                    }
                }
                if (line.event === 'selection' && hardwareState.selection !== null) isWaitingForInput = false;
            }
            else if (line.type === 'cmd') {
                if (text.includes('afficher Fr.') || text.includes('afficher 2.30')) {
                    hardwareState.screen_text = "PRIX: CHF 2.30";
                    if (text.includes('1.80')) hardwareState.screen_text = "PRIX: CHF 1.80";
                } else if (text.includes('demander le code PIN')) {
                    hardwareState.screen_text = "ENTRER PIN";
                } else if (text.includes('Mauvais code PIN')) {
                    hardwareState.screen_text = "PIN INCORRECT";
                } else if (text.includes('afficher 0 francs')) {
                    hardwareState.screen_text = "PAYÉ: 0.00";
                } else if (text.includes('afficher la valeur du montant')) {
                    hardwareState.screen_text = `PAYÉ: ${hardwareState.montant_introduit.toFixed(2)}`;
                } else if (text.includes('imprimer le billet')) {
                    hardwareState.ticket_printed = true;
                    hardwareState.screen_text = "BON VOYAGE";
                }
            }
            else if (line.type === 'fix_dropdown') {
                if (line.selected.includes('imprimer le billet')) {
                    hardwareState.ticket_printed = true;
                    hardwareState.screen_text = "BON VOYAGE";
                } else if (line.selected.includes('Erreur')) {
                    hardwareState.screen_text = "ERREUR LOGICIELLE";
                } else {
                    hardwareState.screen_text = "CHOISIR TRAJET";
                }
            }

            updateHardwareUI();
        }

        function finishExecution() {
            pauseExecution();
            executionState = 'finished';
            document.querySelectorAll('.code-line').forEach(el => el.classList.remove('active'));

            let isFixed = false;
            if (currentDifficulty === 'easy') isFixed = lines[11].selected === lines[11].correct;
            else isFixed = lines[19].selected === lines[19].correct;

            // RETOURS
            if (hardwareState.selection !== null) {
                if (hardwareState.ticket_printed) {
                    hardwareState.customer_status = 'happy';
                    if (isFixed) {
                        document.getElementById('execution-msg').textContent = 'Mission accomplie ! Le bug est corrigé. 🎉';
                        document.getElementById('execution-msg').style.color = 'var(--success)';
                    } else if (currentDifficulty === 'easy' && hardwareState.selection === 'adulte') {
                        document.getElementById('execution-msg').textContent = 'Le tarif Adulte fonctionne bien ! Réinitialise et teste le tarif Enfant 🐛';
                        document.getElementById('execution-msg').style.color = 'var(--text-main)';
                    }
                } else if (hardwareState.montant_introduit > 0 || hardwareState.payment_method === 'nfc') {
                    hardwareState.customer_status = 'angry';
                    document.getElementById('execution-msg').textContent = 'Aïe ! La machine a gardé l\'argent sans rien donner ! Corrige le menu déroulant !';
                    document.getElementById('execution-msg').style.color = 'var(--error)';
                } else if (hardwareState.payment_method === 'carte' && !hardwareState.pin_correct) {
                    hardwareState.customer_status = 'neutral';
                    document.getElementById('execution-msg').textContent = 'PIN Faux : La carte a été rendue proprement.';
                    document.getElementById('execution-msg').style.color = 'var(--text-main)';
                }
            } else {
                document.getElementById('execution-msg').textContent = 'Programme terminé sans action.';
            }

            updateHardwareUI();
            document.getElementById('btn-play').innerHTML = 'Terminé';
            document.getElementById('btn-play').className = 'btn btn-outline';
        }

        // --- INIT ---
        document.querySelectorAll('.diff-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
                e.currentTarget.classList.add('active');
                currentDifficulty = e.currentTarget.id.replace('diff-', '');
                initLevel();
            });
        });

        window.addEventListener('load', () => {
            document.getElementById('btn-play').addEventListener('click', startExecution);
            document.getElementById('btn-step').addEventListener('click', () => { if (!isWaitingForInput && executionState !== 'finished') runStep(); });
            document.getElementById('btn-reset').addEventListener('click', resetExecution);
            initLevel();
        });
    </script>
</body>

</html>
