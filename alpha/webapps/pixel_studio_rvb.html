<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Pixel Studio RVB</title>
    <link rel="stylesheet" href="../../css/shared.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(8, 40px); grid-template-rows: repeat(8, 40px); gap: 1px; background: #222; border: 2px solid #555; }
        .cell { background: #fff; cursor: pointer; }
        .controls { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .preview { width: 50px; height: 50px; border: 2px solid #fff; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Pixel Studio RVB</h1>
    <div class="grid" id="grid"></div>
    <div class="controls">
        <label>R: <input type="range" id="r" min="0" max="255" value="0"></label>
        <label>V: <input type="range" id="v" min="0" max="255" value="0"></label>
        <label>B: <input type="range" id="b" min="0" max="255" value="0"></label>
        <div class="preview" id="preview" style="background: rgb(0,0,0);"></div>
    </div>
    <script>
        const grid = document.getElementById('grid');
        for (let i = 0; i < 64; i++) {
            const cell = document.createElement('div');
            cell.classList.add('cell');
            cell.addEventListener('click', () => {
                cell.style.background = document.getElementById('preview').style.background;
            });
            grid.appendChild(cell);
        }
        function updateColor() {
            const r = document.getElementById('r').value;
            const v = document.getElementById('v').value;
            const b = document.getElementById('b').value;
            document.getElementById('preview').style.background = `rgb(${r},${v},${b})`;
        }
        document.getElementById('r').addEventListener('input', updateColor);
        document.getElementById('v').addEventListener('input', updateColor);
        document.getElementById('b').addEventListener('input', updateColor);
    </script>
</body>
</html>
