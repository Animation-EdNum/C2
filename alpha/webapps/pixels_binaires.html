<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💡 Pixels Binaires</title>
    <meta property="og:title" content="💡 Pixels Binaires">
    <meta property="og:description"
        content="Découvre comment un ordinateur code une image avec des 0 et des 1.">
    <meta property="og:type" content="website">
    <link rel="icon" href="../../favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../../css/shared.css">
    <script src="../../js/scores.js"></script>
    <script src="../../js/audio.js"></script>
    <script src="../../js/lucide.min.js"></script>
    <style>
        body>header,
        body>.container {
            animation: fadeInCascade 0.6s var(--spring-easing) forwards;
        }

        :root {
            --bg-gradient-start: #a78bfa; --bg-gradient-end: #c026d3;
            --card-bg: rgba(249, 250, 252, 0.85); --card-border: #fae8ff; --container-bg: rgba(255, 255, 255, 0.85);
            --text-main: #333; --text-secondary: #666; --text-muted: #777;
            --accent: #d946ef; --accent-dark: #c026d3;
            --badge-bg: #fdf4ff; --badge-color: #a21caf;
            --input-border: #f5d0fe; --instructions-bg: #fae8ff;
            --success: #166534; --error: #b91c1c;
            --shadow-color: rgba(0, 0, 0, 0.3); --card-shadow: rgba(217, 70, 239, 0.15);





            --c-noir: #000000;
            --c-vert: #22c55e;
            --c-bleu: #3b82f6;
            --c-jaune: #eab308;
        }

        body.dark {
            --bg-gradient-start: #4c1d95; --bg-gradient-end: #2e1065;
            --card-bg: rgba(30, 41, 59, 0.75); --card-border: #334155; --container-bg: rgba(15, 23, 42, 0.75);
            --text-main: #f8fafc; --text-secondary: #94a3b8; --text-muted: #64748b;
            --accent: #d946ef; --accent-dark: #c026d3;
            --badge-bg: #701a75; --badge-color: #f5d0fe;
            --input-border: #4a044e; --instructions-bg: #1e293b;
            --success: #34d399; --error: #f87171;
            --shadow-color: rgba(0, 0, 0, 0.5); --card-shadow: rgba(0, 0, 0, 0.4);





            --c-noir: #000000; /* Le noir reste noir même en dark mode pour ce jeu précis */
        }

        body.dark .icon-action-btn {
            background: rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            touch-action: manipulation;
            font-family: 'Outfit', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-main);
        }

        .container {
            max-width: var(--container-max-width, 1400px);
            margin: 0 auto;
            background: var(--container-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 20px 60px var(--shadow-color);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: var(--glass-border);
        }

        .subtitle { text-align: center; color: var(--text-secondary); margin-bottom: 20px; font-size: 14px; }

        /* === TABS === */
        .tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn {
            padding: 8px 20px; border-radius: 20px; border: 2px solid var(--accent);
            background: transparent; color: var(--accent); font-size: 14px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; outline: none;
            min-width: 44px; min-height: 44px; display: flex; align-items: center; gap: 8px;
        }
        .tab-btn.active { background: var(--accent); color: #fff; }
        .tab-btn:hover:not(.active) { background: var(--badge-bg); }
        body.dark .tab-btn:hover:not(.active) { background: var(--card-bg); }

        .mode-container { display: none; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .mode-container.active { display: flex; }

        @media (min-width: 1200px) {
            .mode-container.active {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 30px;
                align-items: start;
                justify-items: center;
            }
            .score-bar {
                grid-column: 1 / -1;
            }
        }

        /* ========== APP CONTENT ========== */
        .app-content {
            display: flex; flex-direction: column; width: 100%; max-width: var(--container-max-width, 1400px); gap: 20px;
            align-items: center;
        }






        .instructions {
            text-align: center;
            margin-bottom: 20px;
            color: var(--text-main);
            font-size: 1.1em;
        }





        .legend {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
            background: var(--instructions-bg);
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid var(--card-border);
        }





        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: monospace;
            font-size: 1.1em;
            color: var(--text-main);
        }





        .color-box {
            width: 20px; height: 20px; border-radius: 4px;
            border: 1px solid var(--border-color);
        }





        /* Grid */
        .pixel-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 2px;
            background: var(--border-color);
            border: 2px solid var(--border-color);
            margin-bottom: 20px;
        }





        .pixel-cell {
            width: 50px;
            height: 50px;
            background: var(--c-noir); /* Par défaut noir = 00 */
            cursor: pointer;
            transition: transform 0.1s;
        }


        .pixel-cell:active {
            transform: scale(0.95);
        }

        @media (max-width: 400px) {
            .pixel-cell { width: 40px; height: 40px; }
        }



        .pixel-cell:active {
            transform: scale(0.95);
        }

        @media (max-width: 400px) {
            .pixel-cell { width: 40px; height: 40px; }
        }


        /* Binary Output/Input */
        .binary-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }





        .binary-text {
            width: 100%;
            min-height: 80px;
            padding: 15px;
            background: var(--badge-bg);
            color: var(--badge-color);
            font-family: 'JetBrains Mono', 'Courier New', Courier, monospace;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 8px;
            word-wrap: break-word;
            text-align: center;
            line-height: 1.5;
            border: 1px dashed var(--accent);
            resize: none;
            letter-spacing: 2px;
        }


        .binary-text:focus {
            outline: 2px solid var(--accent);
        }



        .binary-text:focus {
            outline: 2px solid var(--accent);
        }


        .btn {
            padding: 10px 20px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }


        .btn:hover {
            background: var(--accent-hover);
        }



        .btn:hover {
            background: var(--accent-hover);
        }


        .btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
        }





        .feedback {
            margin-top: 15px;
            font-weight: bold;
            font-size: 1.1em;
            text-align: center;
            min-height: 24px;
        }

        .score-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            width: 100%;
        }

        .score-item {
            background: var(--card-bg);
            padding: 10px 15px;
            border-radius: 8px;
            text-align: center;
            min-width: 100px;
            border: 1px solid var(--border-color);
        }

        .score-label {
            font-size: 14px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-value {
            font-size: 24px;
            font-weight: bold;
            color: var(--text-main);
            font-family: monospace;
        }

    </style>
</head>
<body>
    <div class="container">
        <header class="app-header">
            <div class="header-title-wrapper">
                <a href="../../index.html" class="header-icon" title="Retour à l'accueil" aria-label="Retour à l'accueil">
                    <i data-lucide="lightbulb"></i>
                </a>
                <div>
                    <h1>Pixels Binaires</h1>
                </div>
            </div>
            <div class="action-buttons">
                <div class="settings-dropdown">
                    <button class="icon-action-btn" title="Options" aria-label="Options" id="optionsMenuBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </button>
                    <div class="settings-dropdown-content">
                        <button class="menu-item-btn" id="score-manager-btn" aria-label="Voir mes statistiques">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="18" y1="20" x2="18" y2="10"></line>
                                <line x1="12" y1="20" x2="12" y2="4"></line>
                                <line x1="6" y1="20" x2="6" y2="14"></line>
                            </svg>
                            <span>Voir mes statistiques</span>
                        </button>
                        <button class="menu-item-btn" id="themeToggleBtn" aria-label="Changer de thème">
                            <svg id="icon-sun" style="display:none;" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <circle cx="12" cy="12" r="5"></circle>
                                <line x1="12" y1="1" x2="12" y2="3"></line>
                                <line x1="12" y1="21" x2="12" y2="23"></line>
                                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                                <line x1="1" y1="12" x2="3" y2="12"></line>
                                <line x1="21" y1="12" x2="23" y2="12"></line>
                                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                            </svg>
                            <svg id="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                            </svg>
                            <span id="themeToggleText">Changer le thème</span>
                        </button>
                        <button class="menu-item-btn" id="audioToggleBtn" aria-label="Activer/Désactiver le son">
                            <svg id="icon-vol-on" style="display:none;" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                                <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
                            </svg>
                            <svg id="icon-vol-off" width="18" height="18" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                                <line x1="23" y1="9" x2="17" y2="15"></line>
                                <line x1="17" y1="9" x2="23" y2="15"></line>
                            </svg>
                            <span id="audioToggleText">Activer le son</span>
                        </button>
                    </div>
                </div>
            </div>
        </header>
        <p class="subtitle">Découvre comment un ordinateur code une image avec des 0 et des 1 !</p>

        <div class="tabs">
            <button class="tab-btn active" id="nav-codage"><i data-lucide="edit-3"></i> Codage</button>
            <button class="tab-btn" id="nav-decodage"><i data-lucide="eye"></i> Décodage</button>
        </div>

        <div class="legend">
            <div class="legend-item"><div class="color-box" style="background: var(--c-noir);"></div> 00</div>
            <div class="legend-item"><div class="color-box" style="background: var(--c-vert);"></div> 01</div>
            <div class="legend-item"><div class="color-box" style="background: var(--c-bleu);"></div> 10</div>
            <div class="legend-item"><div class="color-box" style="background: var(--c-jaune);"></div> 11</div>
        </div>

        <!-- MODE CODAGE -->
        <div id="mode-codage" class="mode-container active">
            <div style="display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%;">
                <div class="instructions" style="margin-bottom: 0;">Dessine sur la grille pour voir le code binaire se générer.</div>
                <div class="pixel-grid" id="grid-codage"></div>
            </div>

            <div class="binary-container" style="width: 100%;">
                <div class="binary-text" id="output-codage">00000000000000000000000000000000000000000000000000</div>
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <button class="btn" id="btn-copy"><i data-lucide="copy"></i> Copier le code</button>
                    <button class="btn" id="btn-clear-codage" style="background: var(--error);"><i data-lucide="trash-2"></i> Effacer</button>
                </div>
            </div>
        </div>

        <!-- MODE DECODAGE -->
        <div id="mode-decodage" class="mode-container">
            <div style="display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%;">
                <div class="instructions" style="margin-bottom: 0;">Lis le code binaire et reproduis l'image sur la grille !</div>
                <div class="pixel-grid" id="grid-decodage"></div>
            </div>

            <div class="binary-container" style="width: 100%;">
                <div class="binary-text" id="target-binary"></div>
                <div class="feedback" id="feedback-decodage" style="margin: 0;"></div>
                <button class="btn" id="btn-check"><i data-lucide="check-circle"></i> Valider</button>
            </div>

            <div class="score-bar">
                <div class="score-item">
                    <div class="score-label">Victoires</div>
                    <div class="score-value" id="global-correct">0</div>
                </div>
                <div class="score-item">
                    <div class="score-label">Série 🔥</div>
                    <div class="score-value" id="global-streak">0</div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Init Icons and ScoreManager
        lucide.createIcons();
        ScoreManager.init('pixels_binaires');

        // Navigation Tabs
        const navCodage = document.getElementById('nav-codage');
        const navDecodage = document.getElementById('nav-decodage');
        const modeCodage = document.getElementById('mode-codage');
        const modeDecodage = document.getElementById('mode-decodage');

        navCodage.addEventListener('click', () => {
            navCodage.classList.add('active');
            navDecodage.classList.remove('active');
            modeCodage.classList.add('active');
            modeDecodage.classList.remove('active');
        });

        navDecodage.addEventListener('click', () => {
            navDecodage.classList.add('active');
            navCodage.classList.remove('active');
            modeDecodage.classList.add('active');
            modeCodage.classList.remove('active');
            initDecodageChallenge();
        });

        // Config 4 Colors
        // 00=Noir, 01=Vert, 10=Bleu, 11=Jaune
        const COLORS = [
            { code: '00', var: 'var(--c-noir)' },
            { code: '01', var: 'var(--c-vert)' },
            { code: '10', var: 'var(--c-bleu)' },
            { code: '11', var: 'var(--c-jaune)' }
        ];

        // --- MODE CODAGE ---
        const gridCodage = document.getElementById('grid-codage');
        const outputCodage = document.getElementById('output-codage');
        const btnCopy = document.getElementById('btn-copy');
        const btnClearCodage = document.getElementById('btn-clear-codage');
        let stateCodage = Array(25).fill(0); // Index in COLORS (0 to 3)

        function buildGridCodage() {
            gridCodage.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.classList.add('pixel-cell');
                cell.dataset.index = i;
                cell.style.background = COLORS[stateCodage[i]].var;





                cell.addEventListener('mousedown', () => cycleColorCodage(i));
                cell.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    cycleColorCodage(i);
                }, {passive: false});

                gridCodage.appendChild(cell);
            }
            updateBinaryOutput();
        }

        function cycleColorCodage(index) {
            stateCodage[index] = (stateCodage[index] + 1) % 4;
            gridCodage.children[index].style.background = COLORS[stateCodage[index]].var;
            updateBinaryOutput();
            if(window.AudioTools) AudioTools.play('click');
        }

        function updateBinaryOutput() {
            const binString = stateCodage.map(val => COLORS[val].code).join('');
            outputCodage.textContent = binString;
        }

        btnCopy.addEventListener('click', () => {
            navigator.clipboard.writeText(outputCodage.textContent).then(() => {
                const originalText = btnCopy.innerHTML;
                btnCopy.innerHTML = '<i data-lucide="check"></i> Copié !';
                lucide.createIcons();
                setTimeout(() => {
                    btnCopy.innerHTML = originalText;
                    lucide.createIcons();
                }, 2000);
            });
        });

        btnClearCodage.addEventListener('click', () => {
            stateCodage.fill(0);
            Array.from(gridCodage.children).forEach(cell => cell.style.background = COLORS[0].var);
            updateBinaryOutput();
            if(window.AudioTools) AudioTools.play('click');
        });

        buildGridCodage();

        // --- MODE DECODAGE ---
        const gridDecodage = document.getElementById('grid-decodage');
        const targetBinaryText = document.getElementById('target-binary');
        const feedbackDecodage = document.getElementById('feedback-decodage');
        const btnCheck = document.getElementById('btn-check');
        let targetBinary = "";
        let stateDecodage = Array(25).fill(0);

        function buildGridDecodage() {
            gridDecodage.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.classList.add('pixel-cell');
                cell.dataset.index = i;
                cell.style.background = COLORS[stateDecodage[i]].var;





                cell.addEventListener('mousedown', () => cycleColorDecodage(i));
                cell.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    cycleColorDecodage(i);
                }, {passive: false});

                gridDecodage.appendChild(cell);
            }
        }

        function cycleColorDecodage(index) {
            stateDecodage[index] = (stateDecodage[index] + 1) % 4;
            gridDecodage.children[index].style.background = COLORS[stateDecodage[index]].var;
            if(window.AudioTools) AudioTools.play('click');
        }

        function initDecodageChallenge() {
            // Generate random 50 char string (25 pairs of 00,01,10,11)
            targetBinary = "";
            for(let i=0; i<25; i++) {
                const r = Math.floor(Math.random() * 4);
                targetBinary += COLORS[r].code;
            }





            // Chunk string into 5 lines for readability
            let formattedBinary = "";
            for(let i=0; i<5; i++) {
                formattedBinary += targetBinary.substring(i*10, (i+1)*10) + "<br>";
            }
            targetBinaryText.innerHTML = formattedBinary;

            stateDecodage.fill(0);
            buildGridDecodage();





            feedbackDecodage.textContent = "";
            btnCheck.disabled = false;
        }

        btnCheck.addEventListener('click', () => {
            const currentBinary = stateDecodage.map(val => COLORS[val].code).join('');





            if (currentBinary === targetBinary) {
                feedbackDecodage.textContent = "🎉 Bravo ! Image décodée !";
                feedbackDecodage.style.color = "var(--success)";
                if(window.AudioTools) AudioTools.play('success');
                ScoreManager.addCorrect();
                btnCheck.disabled = true;
                setTimeout(initDecodageChallenge, 2500);
            } else {
                feedbackDecodage.textContent = "❌ Il y a des erreurs, vérifie le code.";
                feedbackDecodage.style.color = "var(--error)";
                if(window.AudioTools) AudioTools.play('error');
                ScoreManager.resetStreak();
            }
        });

        // Dropdown settings
        const optionsBtn = document.getElementById('optionsMenuBtn');
        const settingsContent = document.querySelector('.settings-dropdown-content');

        if (optionsBtn && settingsContent) {
            optionsBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const isVisible = settingsContent.style.display === 'block';
                settingsContent.style.display = isVisible ? 'none' : 'block';
            });

            document.addEventListener('click', () => {
                settingsContent.style.display = 'none';
            });
            settingsContent.addEventListener('click', (e) => e.stopPropagation());
        }

    </script>
    <script src="../../js/swipe.js"></script>
    <script src="../../js/theme.js"></script>
</body>
</html>
