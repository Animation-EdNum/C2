<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💡 Pixels Binaires</title>
    <meta property="og:title" content="💡 Pixels Binaires">
    <meta property="og:description"
        content="Découvre comment un ordinateur code une image avec des 0 et des 1.">
    <meta property="og:type" content="website">
    <link rel="icon" href="../../favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../../css/shared.css">
    <script src="../../js/scores.js"></script>
    <script src="../../js/audio.js"></script>
    <script src="../../js/lucide.min.js"></script>
    <style>
        body > header, body > .container {
            animation: fadeInCascade 0.6s var(--spring-easing) forwards;
        }

        :root {
            --bg-start: #3b82f6;
            --bg-end: #1d4ed8;
            --accent: #2563eb;
            --accent-hover: #1e40af;
            --success: #10b981;
            --error: #ef4444;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --card-bg: rgba(248, 250, 252, 0.85);
            --border-color: #cbd5e1;

            --c-noir: #000000;
            --c-vert: #22c55e;
            --c-bleu: #3b82f6;
            --c-jaune: #eab308;
        }

        body.dark {
            --bg-start: #0f172a;
            --bg-end: #1e3a8a;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #34d399;
            --error: #f87171;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --card-bg: rgba(15, 23, 42, 0.75);
            --border-color: #334155;

            --c-noir: #000000; /* Le noir reste noir même en dark mode pour ce jeu précis */
        }

        body.dark .icon-action-btn {
            background: rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.1);
        }

        /* TABS */
        .tabs {
            display: flex; gap: 10px; margin-bottom: 20px;
            background: var(--card-bg); padding: 5px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); width: 100%; max-width: 500px;
        }
        .tab-btn {
            flex: 1; padding: 12px; border: none; background: transparent;
            font-size: 16px; font-weight: 600; color: var(--text-muted);
            border-radius: 8px; cursor: pointer; transition: all 0.2s;
            font-family: 'Outfit', sans-serif; display: flex; align-items: center;
            justify-content: center; gap: 8px;
        }
        .tab-btn.active {
            background: var(--accent); color: white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        .tab-btn:hover:not(.active) { background: rgba(0, 0, 0, 0.05); }
        body.dark .tab-btn:hover:not(.active) { background: rgba(255, 255, 255, 0.05); }

        .mode-container { display: none; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .mode-container.active { display: flex; }

        .main-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid var(--border-color);
        }

        .instructions {
            text-align: center;
            margin-bottom: 20px;
            color: var(--text-main);
            font-size: 1.1em;
        }

        .legend {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
            background: rgba(0,0,0,0.05);
            padding: 10px;
            border-radius: 8px;
        }
        body.dark .legend { background: rgba(255,255,255,0.05); }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: monospace;
            font-size: 1.1em;
            color: var(--text-main);
        }

        .color-box {
            width: 20px; height: 20px; border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        /* Grid */
        .pixel-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 2px;
            background: var(--border-color);
            border: 2px solid var(--border-color);
            margin-bottom: 20px;
        }

        .pixel-cell {
            width: 50px;
            height: 50px;
            background: var(--c-noir); /* Par défaut noir = 00 */
            cursor: pointer;
            transition: transform 0.1s;
        }

        .pixel-cell:active {
            transform: scale(0.95);
        }

        @media (max-width: 400px) {
            .pixel-cell { width: 40px; height: 40px; }
        }

        /* Binary Output/Input */
        .binary-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .binary-text {
            width: 100%;
            min-height: 80px;
            padding: 15px;
            background: var(--bg-start);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2em;
            border-radius: 8px;
            word-wrap: break-word;
            text-align: center;
            line-height: 1.5;
            border: none;
            resize: none;
        }

        .binary-text:focus {
            outline: 2px solid var(--accent);
        }

        .btn {
            padding: 10px 20px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: var(--accent-hover);
        }

        .btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
        }

        .feedback {
            margin-top: 15px;
            font-weight: bold;
            font-size: 1.1em;
            text-align: center;
            min-height: 24px;
        }

        .score-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            width: 100%;
        }

        .score-item {
            background: var(--card-bg);
            padding: 10px 15px;
            border-radius: 8px;
            text-align: center;
            min-width: 100px;
            border: 1px solid var(--border-color);
        }

        .score-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-value {
            font-size: 24px;
            font-weight: bold;
            color: var(--text-main);
            font-family: monospace;
        }

    </style>
</head>
<body>
    <div class="container">
        <header class="app-header">
            <div class="header-title-wrapper">
                <a href="../../index.html" class="header-icon" title="Retour à l'accueil" aria-label="Retour à l'accueil">
                    <i data-lucide="lightbulb"></i>
                </a>
                <div>
                    <h1>Pixels Binaires</h1>
                </div>
            </div>
            <div class="action-buttons">
                <div class="settings-dropdown">
                    <button class="icon-action-btn" title="Options" aria-label="Options" id="optionsMenuBtn">
                        <i data-lucide="settings"></i>
                    </button>
                    <div class="settings-dropdown-content">
                        <button class="settings-dropdown-item" id="theme-toggle">
                            <i data-lucide="moon" id="theme-icon"></i>
                            <span id="theme-text">Mode sombre</span>
                        </button>
                        <button class="settings-dropdown-item" id="audio-toggle">
                            <i data-lucide="volume-2" id="audio-icon"></i>
                            <span id="audio-text">Désactiver le son</span>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <div class="tabs">
            <button class="tab-btn active" id="nav-codage"><i data-lucide="edit-3"></i> Codage</button>
            <button class="tab-btn" id="nav-decodage"><i data-lucide="eye"></i> Décodage</button>
        </div>

        <div class="legend">
            <div class="legend-item"><div class="color-box" style="background: var(--c-noir);"></div> 00</div>
            <div class="legend-item"><div class="color-box" style="background: var(--c-vert);"></div> 01</div>
            <div class="legend-item"><div class="color-box" style="background: var(--c-bleu);"></div> 10</div>
            <div class="legend-item"><div class="color-box" style="background: var(--c-jaune);"></div> 11</div>
        </div>

        <!-- MODE CODAGE -->
        <div id="mode-codage" class="mode-container active">
            <div class="main-card">
                <div class="instructions">Dessine sur la grille pour voir le code binaire se générer.</div>

                <div class="pixel-grid" id="grid-codage"></div>

                <div class="binary-container">
                    <div class="binary-text" id="output-codage">00000000000000000000000000000000000000000000000000</div>
                    <button class="btn" id="btn-copy"><i data-lucide="copy"></i> Copier le code</button>
                    <button class="btn" id="btn-clear-codage" style="background: var(--error);"><i data-lucide="trash-2"></i> Effacer</button>
                </div>
            </div>
        </div>

        <!-- MODE DECODAGE -->
        <div id="mode-decodage" class="mode-container">
            <div class="main-card">
                <div class="instructions">Lis le code binaire et reproduis l'image sur la grille !</div>

                <div class="binary-container" style="margin-bottom: 20px;">
                    <div class="binary-text" id="target-binary"></div>
                </div>

                <div class="pixel-grid" id="grid-decodage"></div>

                <div class="feedback" id="feedback-decodage"></div>

                <button class="btn" id="btn-check"><i data-lucide="check-circle"></i> Valider</button>
            </div>

            <div class="score-bar">
                <div class="score-item">
                    <div class="score-label">Score</div>
                    <div class="score-value" id="global-correct">0</div>
                </div>
                <div class="score-item">
                    <div class="score-label">Série en cours</div>
                    <div class="score-value" id="global-streak">0</div>
                </div>
                <div class="score-item">
                    <div class="score-label">Record</div>
                    <div class="score-value" id="global-best">0</div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Init Icons and ScoreManager
        lucide.createIcons();
        ScoreManager.init('pixels_binaires');

        // Navigation Tabs
        const navCodage = document.getElementById('nav-codage');
        const navDecodage = document.getElementById('nav-decodage');
        const modeCodage = document.getElementById('mode-codage');
        const modeDecodage = document.getElementById('mode-decodage');

        navCodage.addEventListener('click', () => {
            navCodage.classList.add('active');
            navDecodage.classList.remove('active');
            modeCodage.classList.add('active');
            modeDecodage.classList.remove('active');
        });

        navDecodage.addEventListener('click', () => {
            navDecodage.classList.add('active');
            navCodage.classList.remove('active');
            modeDecodage.classList.add('active');
            modeCodage.classList.remove('active');
            initDecodageChallenge();
        });

        // Config 4 Colors
        // 00=Noir, 01=Vert, 10=Bleu, 11=Jaune
        const COLORS = [
            { code: '00', var: 'var(--c-noir)' },
            { code: '01', var: 'var(--c-vert)' },
            { code: '10', var: 'var(--c-bleu)' },
            { code: '11', var: 'var(--c-jaune)' }
        ];

        // --- MODE CODAGE ---
        const gridCodage = document.getElementById('grid-codage');
        const outputCodage = document.getElementById('output-codage');
        const btnCopy = document.getElementById('btn-copy');
        const btnClearCodage = document.getElementById('btn-clear-codage');
        let stateCodage = Array(25).fill(0); // Index in COLORS (0 to 3)

        function buildGridCodage() {
            gridCodage.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.classList.add('pixel-cell');
                cell.dataset.index = i;
                cell.style.background = COLORS[stateCodage[i]].var;

                cell.addEventListener('mousedown', () => cycleColorCodage(i));
                cell.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    cycleColorCodage(i);
                }, {passive: false});

                gridCodage.appendChild(cell);
            }
            updateBinaryOutput();
        }

        function cycleColorCodage(index) {
            stateCodage[index] = (stateCodage[index] + 1) % 4;
            gridCodage.children[index].style.background = COLORS[stateCodage[index]].var;
            updateBinaryOutput();
            if(window.AudioTools) AudioTools.play('click');
        }

        function updateBinaryOutput() {
            const binString = stateCodage.map(val => COLORS[val].code).join('');
            outputCodage.textContent = binString;
        }

        btnCopy.addEventListener('click', () => {
            navigator.clipboard.writeText(outputCodage.textContent).then(() => {
                const originalText = btnCopy.innerHTML;
                btnCopy.innerHTML = '<i data-lucide="check"></i> Copié !';
                lucide.createIcons();
                setTimeout(() => {
                    btnCopy.innerHTML = originalText;
                    lucide.createIcons();
                }, 2000);
            });
        });

        btnClearCodage.addEventListener('click', () => {
            stateCodage.fill(0);
            Array.from(gridCodage.children).forEach(cell => cell.style.background = COLORS[0].var);
            updateBinaryOutput();
            if(window.AudioTools) AudioTools.play('click');
        });

        buildGridCodage();

        // --- MODE DECODAGE ---
        const gridDecodage = document.getElementById('grid-decodage');
        const targetBinaryText = document.getElementById('target-binary');
        const feedbackDecodage = document.getElementById('feedback-decodage');
        const btnCheck = document.getElementById('btn-check');
        let targetBinary = "";
        let stateDecodage = Array(25).fill(0);

        function buildGridDecodage() {
            gridDecodage.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.classList.add('pixel-cell');
                cell.dataset.index = i;
                cell.style.background = COLORS[stateDecodage[i]].var;

                cell.addEventListener('mousedown', () => cycleColorDecodage(i));
                cell.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    cycleColorDecodage(i);
                }, {passive: false});

                gridDecodage.appendChild(cell);
            }
        }

        function cycleColorDecodage(index) {
            stateDecodage[index] = (stateDecodage[index] + 1) % 4;
            gridDecodage.children[index].style.background = COLORS[stateDecodage[index]].var;
            if(window.AudioTools) AudioTools.play('click');
        }

        function initDecodageChallenge() {
            // Generate random 50 char string (25 pairs of 00,01,10,11)
            targetBinary = "";
            for(let i=0; i<25; i++) {
                const r = Math.floor(Math.random() * 4);
                targetBinary += COLORS[r].code;
            }

            // Chunk string into 5 lines for readability
            let formattedBinary = "";
            for(let i=0; i<5; i++) {
                formattedBinary += targetBinary.substring(i*10, (i+1)*10) + "<br>";
            }
            targetBinaryText.innerHTML = formattedBinary;

            stateDecodage.fill(0);
            buildGridDecodage();

            feedbackDecodage.textContent = "";
            btnCheck.disabled = false;
        }

        btnCheck.addEventListener('click', () => {
            const currentBinary = stateDecodage.map(val => COLORS[val].code).join('');

            if (currentBinary === targetBinary) {
                feedbackDecodage.textContent = "🎉 Bravo ! Image décodée !";
                feedbackDecodage.style.color = "var(--success)";
                if(window.AudioTools) AudioTools.play('success');
                ScoreManager.addCorrect();
                btnCheck.disabled = true;
                setTimeout(initDecodageChallenge, 2500);
            } else {
                feedbackDecodage.textContent = "❌ Il y a des erreurs, vérifie le code.";
                feedbackDecodage.style.color = "var(--error)";
                if(window.AudioTools) AudioTools.play('error');
                ScoreManager.resetStreak();
            }
        });

        // Dropdown settings
        const optionsBtn = document.getElementById('optionsMenuBtn');
        const settingsContent = document.querySelector('.settings-dropdown-content');

        if (optionsBtn && settingsContent) {
            optionsBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const isVisible = settingsContent.style.display === 'block';
                settingsContent.style.display = isVisible ? 'none' : 'block';
            });

            document.addEventListener('click', () => {
                settingsContent.style.display = 'none';
            });
            settingsContent.addEventListener('click', (e) => e.stopPropagation());
        }

    </script>
    <script src="../../js/theme.js"></script>
</body>
</html>
