<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>🔀 Réseau de tri</title>
    <meta property="og:title" content="Réseau de tri">
    <meta property="og:description" content="Découvre comment fonctionne un algorithme de tri en réseau.">
    <link rel="icon" href="../../favicon.svg" type="image/svg+xml">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/shared.css">
    <style>
        body > header, body > .container {
            animation: fadeInCascade 0.6s var(--spring-easing) forwards;
        }

        :root {
            --bg-gradient-start: #38bdf8; --bg-gradient-end: #0284c7;
            --card-bg: rgba(249, 250, 252, 0.85); --card-border: #e0f2fe; --container-bg: rgba(255, 255, 255, 0.85);
            --text-main: #333; --text-secondary: #666; --text-muted: #777;
            --accent: #0284c7; --accent-dark: #0369a1;
            --badge-bg: #e0f2fe; --badge-color: #0284c7;
            --input-border: #bae6fd; --instructions-bg: #f0f9ff;
            --success: #166534; --error: #b91c1c;
            --shadow-color: rgba(0, 0, 0, 0.3); --card-shadow: rgba(2, 132, 199, 0.15);

            --wire-color: #94a3b8;
            --wire-active: #0284c7;
            --comp-color: #cbd5e1;
            --comp-active: #0ea5e9;
            --comp-hover: #38bdf8;
            --element-bg: #fff;
            --element-border: #0284c7;
            --element-text: #0284c7;
        }

        body.dark {
            --bg-gradient-start: #0f172a; --bg-gradient-end: #082f49;
            --card-bg: rgba(30, 41, 59, 0.75); --card-border: #334155; --container-bg: rgba(15, 23, 42, 0.75);
            --text-main: #f8fafc; --text-secondary: #94a3b8; --text-muted: #64748b;
            --accent: #0ea5e9; --accent-dark: #0284c7;
            --badge-bg: #0c4a6e; --badge-color: #38bdf8;
            --input-border: #334155; --instructions-bg: #0f172a;
            --success: #34d399; --error: #f87171;
            --shadow-color: rgba(0, 0, 0, 0.5); --card-shadow: rgba(0, 0, 0, 0.4);

            --wire-color: #475569;
            --wire-active: #0ea5e9;
            --comp-color: #334155;
            --comp-active: #38bdf8;
            --comp-hover: #7dd3fc;
            --element-bg: #1e293b;
            --element-border: #0ea5e9;
            --element-text: #e0f2fe;
        }

        body.dark .icon-action-btn { background: rgba(0, 0, 0, 0.4); border-color: rgba(255,255,255,0.1); }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            touch-action: manipulation;
            font-family: 'Outfit', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh; padding: 20px; color: var(--text-main);
        }

        .container {
            max-width: 900px; margin: 0 auto; background: var(--container-bg);
            padding: 30px; border-radius: 15px; box-shadow: 0 20px 60px var(--shadow-color);
            backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: var(--glass-border);
        }

        h1 { text-align: center; color: var(--accent); margin-bottom: 5px; font-size: 28px; }
        .subtitle { text-align: center; color: var(--text-secondary); margin-bottom: 20px; font-size: 14px; }

        /* ========== TABS ========== */
        .tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn {
            padding: 8px 20px; border-radius: 20px; border: 2px solid var(--accent);
            background: transparent; color: var(--accent); font-size: 14px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; outline: none;
            min-width: 44px; min-height: 44px;
        }
        .tab-btn.active { background: var(--accent); color: #fff; }
        .tab-btn:hover:not(.active) { background: #e0f2fe; }
        body.dark .tab-btn:hover:not(.active) { background: var(--card-bg); }

        /* ========== DIFFICULTÉ ========== */
        .difficulty-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 25px; flex-wrap: wrap; }
        .diff-btn {
            padding: 6px 16px; border-radius: 20px; border: 2px solid var(--accent);
            background: transparent; color: var(--accent); font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; outline: none;
            min-width: 44px; min-height: 44px;
        }
        .diff-btn.active { background: var(--accent); color: #fff; }
        .diff-btn:hover:not(.active) { background: #e0f2fe; }

        /* ========== GAME AREA ========== */
        .game-area {
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            margin-bottom: 30px;
            overflow-x: auto;
            padding-bottom: 20px;
        }

        .network-wrapper {
            position: relative;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 40px 60px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
            min-width: fit-content;
        }

        .network-grid {
            position: relative;
            /* Will be set dynamically by JS */
        }

        /* SVG Overlay for drawing lines */
        .network-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* Let clicks pass through to comparators if needed */
        }

        .svg-wire {
            stroke: var(--wire-color);
            stroke-width: 4;
            stroke-linecap: round;
        }
        .svg-wire.active-wire {
            stroke: var(--wire-active);
        }

        .svg-comp-line {
            stroke: var(--comp-color);
            stroke-width: 6;
            stroke-linecap: round;
            transition: stroke 0.2s;
        }
        .svg-comp-node {
            fill: var(--comp-color);
            transition: fill 0.2s;
        }

        /* Clickable area for comparators */
        .comparator-btn {
            position: absolute;
            background: transparent;
            cursor: pointer;
            z-index: 10;
            transform: translateX(-50%);
            /* We make it slightly wider than the line to make it easy to click */
            width: 30px;
            border-radius: 15px;
        }

        .comparator-btn:disabled {
            cursor: not-allowed;
        }

        /* Elements moving on the grid */
        .element {
            position: absolute;
            width: 44px; height: 44px;
            border-radius: 50%;
            background: var(--element-bg);
            border: 3px solid var(--element-border);
            color: var(--element-text);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: bold;
            transform: translate(-50%, -50%);
            transition: top 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), left 0.4s ease-in-out;
            z-index: 20;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .action-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: flex; align-items: center; gap: 8px;
            min-height: 44px;
        }
        .btn-primary:hover { background: var(--accent-dark); transform: translateY(-2px); }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; transform: none; }

        /* ========== FEEDBACK & SCORE ========== */
        .feedback { font-size: 16px; font-weight: 600; text-align: center; height: 24px; margin-bottom: 10px; transition: color 0.3s; }
        .feedback.success { color: var(--success); }
        .feedback.error { color: var(--error); }
        .feedback.info { color: var(--accent); }

        .score-bar { display: flex; justify-content: center; gap: 24px; margin-top: 25px; padding-top: 20px; border-top: 1px solid var(--card-border); flex-wrap: wrap; }
        .score-item { text-align: center; }
        .score-item .score-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; }
        .score-item .score-value { font-size: 22px; font-weight: 700; color: var(--accent); font-family: monospace; }

        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }

        @media print { .no-print { display: none !important; } }
    </style>

    <script>
        // Configuration du réseau de tri (Sorting Networks)
        // [ [ {wire1, wire2}, ... ], [ ... ] ] -> array de stages, chaque stage a des comparateurs
        const NETWORKS = {
            3: [
                [{w1: 0, w2: 1}],
                [{w1: 1, w2: 2}],
                [{w1: 0, w2: 1}]
            ],
            4: [
                [{w1: 0, w2: 1}, {w1: 2, w2: 3}],
                [{w1: 0, w2: 2}, {w1: 1, w2: 3}],
                [{w1: 1, w2: 2}]
            ],
            5: [
                [{w1: 0, w2: 1}, {w1: 2, w2: 3}],
                [{w1: 1, w2: 3}, {w1: 2, w2: 4}],
                [{w1: 0, w2: 2}, {w1: 1, w2: 4}],
                [{w1: 1, w2: 2}, {w1: 3, w2: 4}],
                [{w1: 2, w2: 3}]
            ]
        };

        const GRID_SPACING_Y = 60; // Distance between horizontal wires
        const GRID_SPACING_X = 80; // Distance between stages (vertical comparators)

        let currentMode = 'nombres'; // 'nombres' ou 'lettres'
        let currentDifficulty = 'medium'; // 'easy'=3, 'medium'=4, 'hard'=5
        let numWires = 4;

        let globalCorrect = 0;
        let globalStreak = 0;
        let globalBest = 0;

        let networkDef = [];
        let currentState = []; // array of { value, currentWire, domElement }
        let currentStageIndex = 0;

        // UI Elements
        const gridContainer = document.getElementById('network-grid');
        const svgContainer = document.getElementById('network-svg');
        const wrapper = document.getElementById('network-wrapper');
        const feedbackMsg = document.getElementById('feedback-msg');
        const btnNextStep = document.getElementById('btn-next-step');

        function init() {
            setupEventListeners();
            ScoreManager.init('reseau_de_tri');
            setDifficulty('medium'); // Will trigger startNewLevel
        }

        function setupEventListeners() {
            // Tabs
            document.getElementById('tab-nombres').addEventListener('click', () => setMode('nombres'));
            document.getElementById('tab-lettres').addEventListener('click', () => setMode('lettres'));

            // Difficulty
            document.getElementById('diff-easy').addEventListener('click', () => setDifficulty('easy'));
            document.getElementById('diff-medium').addEventListener('click', () => setDifficulty('medium'));
            document.getElementById('diff-hard').addEventListener('click', () => setDifficulty('hard'));

            // Next Step
            btnNextStep.addEventListener('click', handleNextStep);

            // Listen for global difficulty change (if used by other parts of Suite EdNum)
            window.addEventListener('c2_change_difficulty', (e) => {
                const nextDiff = e.detail.difficulty;
                if (nextDiff === '4') document.getElementById('diff-easy')?.click();
                else if (nextDiff === '6') document.getElementById('diff-medium')?.click();
                else if (nextDiff === '8') document.getElementById('diff-hard')?.click();
            });
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('tab-nombres').classList.toggle('active', mode === 'nombres');
            document.getElementById('tab-lettres').classList.toggle('active', mode === 'lettres');
            startNewLevel();
        }

        function setDifficulty(diff) {
            currentDifficulty = diff;
            document.querySelectorAll('.diff-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`diff-${diff}`).classList.add('active');

            if (diff === 'easy') numWires = 3;
            if (diff === 'medium') numWires = 4;
            if (diff === 'hard') numWires = 5;

            startNewLevel();
        }

        function generateValues(n) {
            let vals = [];
            if (currentMode === 'nombres') {
                // Generate N distinct random numbers between 1 and 20
                while(vals.length < n) {
                    let r = Math.floor(Math.random() * 20) + 1;
                    if(vals.indexOf(r) === -1) vals.push(r);
                }
            } else {
                // Generate N distinct letters
                const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
                while(vals.length < n) {
                    let r = alphabet[Math.floor(Math.random() * alphabet.length)];
                    if(vals.indexOf(r) === -1) vals.push(r);
                }
            }
            // Ensure they are not already sorted
            let sorted = [...vals].sort((a,b) => {
                if (currentMode === 'nombres') return parseInt(a) - parseInt(b);
                return a.localeCompare(b);
            });
            let isSorted = true;
            for(let i=0; i<n; i++) if(vals[i] !== sorted[i]) isSorted = false;

            if(isSorted) {
                // swap first two to unsort
                let temp = vals[0]; vals[0] = vals[1]; vals[1] = temp;
            }
            return vals;
        }

        function drawNetwork() {
            svgContainer.innerHTML = '';

            const numStages = networkDef.length;
            const totalWidth = (numStages + 1) * GRID_SPACING_X;
            const totalHeight = (numWires - 1) * GRID_SPACING_Y;

            gridContainer.style.width = `${totalWidth}px`;
            gridContainer.style.height = `${totalHeight}px`;

            // Draw horizontal wires
            for(let i=0; i<numWires; i++) {
                const y = i * GRID_SPACING_Y;
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", "0");
                line.setAttribute("y1", y);
                line.setAttribute("x2", totalWidth);
                line.setAttribute("y2", y);
                line.setAttribute("class", "svg-wire");
                svgContainer.appendChild(line);
            }

            // Draw comparators
            networkDef.forEach((stage, stageIdx) => {
                stage.forEach((comp, compIdx) => {
                    let offsetX = 0;
                    if (stage.length > 1) {
                        // Check for overlaps in the same stage to apply horizontal offset
                        // If there are multiple comparators in the same stage, spread them out slightly
                        // e.g. -15px for first, +15px for second
                        if (compIdx === 0) offsetX = -15;
                        else if (compIdx === 1) offsetX = 15;
                    }
                    const x = (stageIdx + 1) * GRID_SPACING_X + offsetX;
                    const y1 = comp.w1 * GRID_SPACING_Y;
                    const y2 = comp.w2 * GRID_SPACING_Y;

                    // Line
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", x);
                    line.setAttribute("y1", y1);
                    line.setAttribute("x2", x);
                    line.setAttribute("y2", y2);
                    line.setAttribute("class", `svg-comp-line stage-${stageIdx}`);
                    svgContainer.appendChild(line);

                    // Nodes (dots at intersections)
                    const node1 = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    node1.setAttribute("cx", x); node1.setAttribute("cy", y1); node1.setAttribute("r", "5");
                    node1.setAttribute("class", `svg-comp-node stage-${stageIdx}`);
                    svgContainer.appendChild(node1);

                    const node2 = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    node2.setAttribute("cx", x); node2.setAttribute("cy", y2); node2.setAttribute("r", "5");
                    node2.setAttribute("class", `svg-comp-node stage-${stageIdx}`);
                    svgContainer.appendChild(node2);

                    // Clickable overlay button for the comparator
                    const btn = document.createElement('div');
                    btn.className = `comparator-btn stage-${stageIdx}`;
                    btn.style.left = `${x}px`;
                    btn.style.top = `${y1}px`;
                    btn.style.height = `${y2 - y1}px`;
                    btn.dataset.stage = stageIdx;
                    btn.dataset.w1 = comp.w1;
                    btn.dataset.w2 = comp.w2;

                    btn.addEventListener('click', () => {
                        if(currentStageIndex == stageIdx) {
                            swapElements(comp.w1, comp.w2);
                            playSound('click');
                        }
                    });

                    // Hover effects on SVG elements
                    btn.addEventListener('mouseenter', () => {
                        if(currentStageIndex == stageIdx) {
                            line.style.stroke = 'var(--comp-hover)';
                            node1.style.fill = 'var(--comp-hover)';
                            node2.style.fill = 'var(--comp-hover)';
                        }
                    });
                    btn.addEventListener('mouseleave', () => {
                        updateHighlights();
                    });

                    gridContainer.appendChild(btn);
                });
            });
        }

        function createElements(values) {
            // Remove old elements
            document.querySelectorAll('.element').forEach(el => el.remove());

            currentState = values.map((val, idx) => {
                const el = document.createElement('div');
                el.className = 'element';
                el.textContent = val;
                gridContainer.appendChild(el);

                let stateObj = {
                    value: val,
                    currentWire: idx,
                    domElement: el
                };

                updateElementPosition(stateObj, 0); // Start at stage 0
                return stateObj;
            });
        }

        function updateElementPosition(stateObj, stageIndex) {
            const x = stageIndex * GRID_SPACING_X;
            const y = stateObj.currentWire * GRID_SPACING_Y;
            stateObj.domElement.style.left = `${x}px`;
            stateObj.domElement.style.top = `${y}px`;
        }

        function swapElements(w1, w2) {
            let el1 = currentState.find(s => s.currentWire === w1);
            let el2 = currentState.find(s => s.currentWire === w2);

            if(el1 && el2) {
                el1.currentWire = w2;
                el2.currentWire = w1;

                // Keep visually at the same stage
                updateElementPosition(el1, currentStageIndex);
                updateElementPosition(el2, currentStageIndex);
            }
        }

        function updateHighlights() {
            // Update comparators
            const numStages = networkDef.length;
            for(let i=0; i<numStages; i++) {
                const isActive = (i === currentStageIndex);

                // SVG lines
                document.querySelectorAll(`line.stage-${i}`).forEach(el => {
                    el.style.stroke = isActive ? 'var(--comp-active)' : 'var(--comp-color)';
                });

                // SVG nodes
                document.querySelectorAll(`circle.stage-${i}`).forEach(el => {
                    el.style.fill = isActive ? 'var(--comp-active)' : 'var(--comp-color)';
                });

                // HTML buttons
                document.querySelectorAll(`div.comparator-btn.stage-${i}`).forEach(el => {
                    if(isActive) {
                        el.classList.add('active');
                        el.style.cursor = 'pointer';
                        el.removeAttribute('disabled');
                    } else {
                        el.classList.remove('active');
                        el.style.cursor = i > currentStageIndex ? 'not-allowed' : 'default';
                        if(i !== currentStageIndex) el.setAttribute('disabled', 'true');
                    }
                });
            }

            // Update button text if at the end
            if (currentStageIndex >= networkDef.length) {
                btnNextStep.innerHTML = `Terminé <i data-lucide="check-circle"></i>`;
                btnNextStep.disabled = true;
                lucide.createIcons();
            } else {
                btnNextStep.innerHTML = `Valider l'étape <i data-lucide="arrow-right"></i>`;
                btnNextStep.disabled = false;
                lucide.createIcons();
            }
        }

        function startNewLevel() {
            feedbackMsg.textContent = '';
            feedbackMsg.className = 'feedback info';
            btnNextStep.disabled = false;

            networkDef = NETWORKS[numWires];
            currentStageIndex = 0;

            // Generate values
            const initialValues = generateValues(numWires);

            // Clear grid HTML except SVG (which will be redrawn)
            gridContainer.innerHTML = '';

            drawNetwork();
            createElements(initialValues);
            updateHighlights();

            lucide.createIcons();
        }

        function handleNextStep() {
            if(currentStageIndex >= networkDef.length) return;

            // Validate current stage
            const stageComparators = networkDef[currentStageIndex];
            let isCorrect = true;

            // the smaller element should go to the smaller wire index (top)
            stageComparators.forEach(comp => {
                let topWire = Math.min(comp.w1, comp.w2);
                let botWire = Math.max(comp.w1, comp.w2);

                let elTop = currentState.find(s => s.currentWire === topWire);
                let elBot = currentState.find(s => s.currentWire === botWire);

                // Check if they need swapping
                if(elTop && elBot) {
                    let vTop = elTop.value;
                    let vBot = elBot.value;

                    if(currentMode === 'nombres') {
                        if(parseInt(vTop) > parseInt(vBot)) isCorrect = false;
                    } else {
                        if(vTop > vBot) isCorrect = false;
                    }
                }
            });

            if(!isCorrect) {
                playSound('error');
                showFeedback('Attention, des éléments sont mal triés sur les barres actives !', 'error');
                updateScore(false);
                return;
            }

            // Move to next stage visually
            playSound('success'); // or a "woosh" sound
            currentStageIndex++;

            currentState.forEach(stateObj => {
                updateElementPosition(stateObj, currentStageIndex);
            });

            updateHighlights();

            // Check if finished
            if(currentStageIndex >= networkDef.length) {
                setTimeout(() => {
                    launchConfetti();
                    playSound('win');
                    showFeedback('Bravo ! Le réseau a trié tous les éléments !', 'success');
                    updateScore(true);

                    // Auto restart after a bit
                    setTimeout(() => {
                        startNewLevel();
                    }, 4000);
                }, 500); // Wait for the transition to finish
            } else {
                showFeedback('Étape validée !', 'success');
            }
        }

        function showFeedback(msg, type) {
            feedbackMsg.textContent = msg;
            feedbackMsg.className = `feedback ${type}`;
        }

        function updateScore(correct) {
            if (correct) {
                globalCorrect++;
                globalStreak++;
                if (globalStreak > globalBest) globalBest = globalStreak;
            } else {
                globalStreak = 0;
            }
            document.getElementById('global-correct').textContent = globalCorrect;
            document.getElementById('global-streak').textContent = globalStreak;
            document.getElementById('global-best').textContent = globalBest;

            ScoreManager.updateScore(globalCorrect, globalStreak, globalBest);
        }

        window.addEventListener('load', init);
    </script>
    <script src="../../js/theme.js"></script>
    <script src="../../js/swipe.js"></script>
</body>
</html>
