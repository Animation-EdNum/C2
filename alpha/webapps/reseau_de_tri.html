<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Réseau de tri</title>
    <link rel="stylesheet" href="../../css/shared.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .network { display: flex; gap: 20px; font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        .box { width: 50px; height: 50px; border: 2px solid #ccc; display: flex; align-items: center; justify-content: center; background: #333; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Réseau de tri</h1>
    <div class="network" id="start">
        <div class="box">4</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">1</div>
    </div>
    <button onclick="sortStep()">Trier (Étape)</button>
    <div class="network" id="end" style="margin-top: 20px; opacity: 0.5;">
        <div class="box"></div><div class="box"></div><div class="box"></div><div class="box"></div>
    </div>
    <script>
        let arr = [4, 2, 3, 1];
        let step = 0;
        function updateUI(id, data) {
            const boxes = document.getElementById(id).querySelectorAll('.box');
            data.forEach((val, i) => boxes[i].textContent = val);
        }
        function sortStep() {
            if (step === 0) {
                if (arr[0] > arr[1]) [arr[0], arr[1]] = [arr[1], arr[0]];
                if (arr[2] > arr[3]) [arr[2], arr[3]] = [arr[3], arr[2]];
            } else if (step === 1) {
                if (arr[0] > arr[2]) [arr[0], arr[2]] = [arr[2], arr[0]];
                if (arr[1] > arr[3]) [arr[1], arr[3]] = [arr[3], arr[1]];
            } else if (step === 2) {
                if (arr[1] > arr[2]) [arr[1], arr[2]] = [arr[2], arr[1]];
            }
            updateUI('end', arr);
            document.getElementById('end').style.opacity = 1;
            step++;
            if(step > 2) alert("Tri terminé !");
        }
        updateUI('start', arr);
    </script>
</body>
</html>
