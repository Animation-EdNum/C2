<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>🏗️ Jeu de la grue</title>
    <meta property="og:title" content="Jeu de la grue">
    <meta property="og:description" content="Déplace la grue pour attraper et déplacer des objets.">
    <link rel="icon" href="../../favicon.svg" type="image/svg+xml">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/shared.css">
    <style>
        body > header, body > .container {
            animation: fadeInCascade 0.6s var(--spring-easing) forwards;
        }

        :root {
            --bg-gradient-start: #f6d365; --bg-gradient-end: #fda085;
            --card-bg: rgba(249, 250, 252, 0.85); --card-border: #fef08a; --container-bg: rgba(255, 255, 255, 0.85);
            --text-main: #333; --text-secondary: #666; --text-muted: #777;
            --accent: #f59e0b; --accent-dark: #d97706;
            --badge-bg: #fef3c7; --badge-color: #b45309;
            --input-border: #fde68a; --instructions-bg: #fffbeb;
            --success: #166534; --error: #b91c1c;
            --shadow-color: rgba(0, 0, 0, 0.3); --card-shadow: rgba(245, 158, 11, 0.15);
        }

        body.dark {
            --bg-gradient-start: #422006; --bg-gradient-end: #78350f;
            --card-bg: rgba(30, 41, 59, 0.75); --card-border: #78350f; --container-bg: rgba(15, 23, 42, 0.75);
            --text-main: #f8fafc; --text-secondary: #94a3b8; --text-muted: #64748b;
            --accent: #f59e0b; --accent-dark: #d97706;
            --badge-bg: #78350f; --badge-color: #fcd34d;
            --input-border: #78350f; --instructions-bg: #451a03;
            --success: #34d399; --error: #f87171;
            --shadow-color: rgba(0, 0, 0, 0.5); --card-shadow: rgba(0, 0, 0, 0.4);
        }

        body.dark .icon-action-btn { background: rgba(0, 0, 0, 0.4); border-color: rgba(255,255,255,0.1); }
        body.dark .cell { border-color: #475569; background: rgba(30, 41, 59, 0.8); }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            touch-action: manipulation;
            font-family: 'Outfit', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh; padding: 20px; color: var(--text-main);
        }

        .container {
            max-width: 800px; margin: 0 auto; background: var(--container-bg);
            padding: 30px; border-radius: 15px; box-shadow: 0 20px 60px var(--shadow-color);
            backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: var(--glass-border);
        }

        h1 { text-align: center; color: var(--accent); margin-bottom: 5px; font-size: 28px; }
        .subtitle { text-align: center; color: var(--text-secondary); margin-bottom: 20px; font-size: 14px; }

        /* ========== DIFFICULTÉ ========== */
        .difficulty-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 25px; flex-wrap: wrap; }
        .diff-btn {
            padding: 6px 16px; border-radius: 20px; border: 2px solid var(--accent);
            background: transparent; color: var(--accent); font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; outline: none;
            min-width: 44px; min-height: 44px;
        }
        .diff-btn.active { background: var(--accent); color: #fff; }
        .diff-btn:hover:not(.active) { background: #fef3c7; }
        body.dark .diff-btn:hover:not(.active) { background: var(--card-bg); }

        /* ========== GAME BOARDS ========== */
        .game-boards {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 40px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .board-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .main-wrapper {
            padding-top: 70px;
            position: relative;
        }

        .board-title {
            font-size: 14px;
            text-transform: uppercase;
            font-weight: bold;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .board {
            display: flex;
            gap: 15px;
            padding: 15px;
            background: var(--card-bg);
            border: 2px solid var(--card-border);
            border-radius: 16px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        }
        body.dark .board { box-shadow: inset 0 2px 10px rgba(0,0,0,0.2); }

        .cup {
            width: 70px;
            height: 180px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 0 0 16px 16px;
            border: 4px solid #cbd5e1;
            border-top: none;
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            padding: 5px;
            gap: 5px;
            position: relative;
            box-shadow: inset 0 -5px 10px rgba(0,0,0,0.05);
        }
        body.dark .cup { background: rgba(0, 0, 0, 0.2); border-color: #475569; }

        .target-board .cup {
            width: 45px;
            height: 120px;
            border-width: 3px;
            padding: 3px;
            gap: 3px;
            border-radius: 0 0 12px 12px;
        }

        .cube {
            width: 100%;
            height: 50px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border-radius: 8px;
            box-shadow: 0 4px 0 #1d4ed8, 0 5px 5px rgba(0,0,0,0.2), inset 0 2px 4px rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: white;
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.2s;
        }

        .target-board .cube {
            height: 35px;
            box-shadow: 0 2px 0 #1d4ed8, 0 3px 3px rgba(0,0,0,0.2);
            border-radius: 6px;
        }

        .crane-layer {
            position: absolute;
            top: 0;
            left: 15px;
            right: 15px;
            height: 70px;
            pointer-events: none;
        }

        .crane {
            width: 70px;
            height: 70px;
            position: absolute;
            top: -10px;
            left: 0;
            transition: left 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2));
        }

        .crane-arm {
            width: 12px;
            height: 40px;
            background: linear-gradient(90deg, #94a3b8, #cbd5e1, #94a3b8);
            border-radius: 6px;
            position: relative;
            transition: height 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid #64748b;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.1);
        }

        .crane-claw {
            width: 50px;
            height: 25px;
            border: 8px solid var(--accent-dark);
            border-top: none;
            border-radius: 0 0 12px 12px;
            position: relative;
            top: -5px;
            background: transparent;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }

        .crane.holding .crane-claw::after {
            content: '';
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border-radius: 8px;
            position: absolute;
            top: 5px;
            left: -5px;
            box-shadow: 0 4px 0 #1d4ed8, 0 5px 5px rgba(0,0,0,0.2), inset 0 2px 4px rgba(255,255,255,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* ========== PROGRAMMING AREA ========== */
        .program-area {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-bottom: 30px;
            max-width: 650px;
            margin-left: auto;
            margin-right: auto;
        }

        .program-strip-wrapper {
            background: var(--card-bg);
            border: 2px solid var(--card-border);
            border-radius: 20px;
            padding: 15px 20px;
            min-height: 90px;
            display: flex;
            align-items: center;
            overflow-x: auto;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        }
        body.dark .program-strip-wrapper { box-shadow: inset 0 2px 10px rgba(0,0,0,0.2); }

        .program-strip {
            display: flex;
            gap: 10px;
        }

        .prog-step {
            width: 55px;
            height: 55px;
            background: #e2e8f0;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            flex-shrink: 0;
            box-shadow: 0 4px 0 #cbd5e1;
            transition: all 0.2s;
            font-size: 24px;
        }
        body.dark .prog-step { background: #475569; box-shadow: 0 4px 0 #334155; }

        .prog-step.active {
            background: var(--accent);
            color: white;
            transform: scale(1.1) translateY(4px);
            box-shadow: 0 0 0 transparent;
        }

        .controls-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .instructions-group {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            padding: 15px;
            background: var(--card-bg);
            border-radius: 20px;
            border: 2px solid var(--card-border);
        }

        .instruction-btn {
            width: 65px;
            height: 65px;
            border-radius: 18px;
            border: 2px solid var(--card-border);
            background: white;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 5px 0 var(--card-border), 0 6px 6px var(--card-shadow);
            font-size: 28px;
        }

        .instruction-btn:hover { background: #fef3c7; transform: translateY(-2px); box-shadow: 0 7px 0 var(--card-border), 0 8px 8px var(--card-shadow); }
        body.dark .instruction-btn { background: var(--card-bg); }
        body.dark .instruction-btn:hover { background: #475569; }
        .instruction-btn:active { transform: scale(0.95) translateY(5px); box-shadow: 0 0 0 transparent; }

        .instruction-btn.action-color {
            color: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 5px 0 var(--accent-dark), 0 6px 6px var(--card-shadow);
        }
        .instruction-btn.action-color:hover {
            box-shadow: 0 7px 0 var(--accent-dark), 0 8px 8px var(--card-shadow);
        }

        .execution-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .exec-btn {
            padding: 14px 28px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.1s;
            min-height: 54px;
            box-shadow: 0 5px 0 rgba(0,0,0,0.15);
        }
        .exec-btn:active { transform: scale(0.95) translateY(5px); box-shadow: 0 0 0 transparent; }

        .play-btn { background: var(--success); color: white; box-shadow: 0 5px 0 #14532d; font-size: 18px; padding: 14px 36px; }
        .play-btn:hover { background: #15803d; transform: translateY(-2px); box-shadow: 0 7px 0 #14532d; }
        .play-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: 0 5px 0 #14532d; }

        .del-btn { background: var(--card-bg); border: 2px solid var(--card-border); color: var(--text-main); }
        .del-btn:hover { background: #fef3c7; }
        .clear-btn { background: var(--error); color: white; box-shadow: 0 5px 0 #7f1d1d; }
        .clear-btn:hover { background: #dc2626; }

        /* ========== FEEDBACK & SCORE ========== */
        .feedback { font-size: 16px; font-weight: 600; text-align: center; height: 24px; margin-bottom: 10px; transition: color 0.3s; }
        .feedback.success { color: var(--success); }
        .feedback.error { color: var(--error); }

        .score-bar { display: flex; justify-content: center; gap: 24px; margin-top: 25px; padding-top: 20px; border-top: 1px solid var(--card-border); flex-wrap: wrap; }
        .score-item { text-align: center; }
        .score-item .score-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; }
        .score-item .score-value { font-size: 22px; font-weight: 700; color: var(--accent); font-family: monospace; }

        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }

        @media print { .no-print { display: none !important; } }
    </style>
    <script src="../../js/scores.js"></script>
    <script src="../../js/audio.js"></script>
    <script src="../../js/lucide.min.js"></script>
</head>

    <script>
        let currentDifficulty = 'medium'; // 'easy', 'medium', 'hard'
        let globalCorrect = 0, globalStreak = 0, globalBest = 0;

        const NUM_CUPS = 3;
        const MAX_STACK = 3;

        let cups = [[], [], []];
        let initialCupsState = [[], [], []];
        let targetCups = [[], [], []];

        let craneState = { pos: 0, height: 0, holding: null };
        let program = [];
        let isExecuting = false;

        const feedbackMsg = document.getElementById('feedback-msg');
        const targetBoardEl = document.getElementById('target-board');
        const mainBoardEl = document.getElementById('main-board');
        const craneEl = document.getElementById('crane');
        const craneArmEl = document.getElementById('crane-arm');
        const craneClawEl = document.getElementById('crane-claw');
        const programStrip = document.getElementById('program-strip');
        const playBtn = document.getElementById('play-btn');

        function init() {
            setupEventListeners();
            startNewLevel();
            ScoreManager.init('jeu_de_la_grue');
        }

        function setupEventListeners() {
            document.getElementById('diff-easy').addEventListener('click', () => setDifficulty('easy'));
            document.getElementById('diff-medium').addEventListener('click', () => setDifficulty('medium'));
            document.getElementById('diff-hard').addEventListener('click', () => setDifficulty('hard'));

            window.addEventListener('keydown', (e) => {
                if (e.repeat || isExecuting) return;
                if (document.activeElement && document.activeElement.tagName === 'INPUT') return;

                switch(e.key) {
                    case 'ArrowUp': e.preventDefault(); addInstruction('up'); break;
                    case 'ArrowDown': e.preventDefault(); addInstruction('down'); break;
                    case 'ArrowLeft': e.preventDefault(); addInstruction('left'); break;
                    case 'ArrowRight': e.preventDefault(); addInstruction('right'); break;
                    case ' ': e.preventDefault(); addInstruction('action'); break;
                    case 'Enter': e.preventDefault(); executeProgram(); break;
                    case 'Backspace': e.preventDefault(); deleteLastInstruction(); break;
                }
            });

            window.addEventListener('c2_change_difficulty', (e) => {
                const nextDiff = e.detail.difficulty;
                if (nextDiff === '4') document.getElementById('diff-easy')?.click();
                else if (nextDiff === '6') document.getElementById('diff-medium')?.click();
                else if (nextDiff === '8') document.getElementById('diff-hard')?.click();
            });
        }

        function setDifficulty(diff) {
            currentDifficulty = diff;
            document.querySelectorAll('.diff-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`diff-${diff}`).classList.add('active');
            startNewLevel();
        }

        function generateRandomState(numBlocks) {
            let state = [[], [], []];
            for(let i=0; i<numBlocks; i++) {
                let cupIdx;
                do {
                    cupIdx = Math.floor(Math.random() * NUM_CUPS);
                } while (state[cupIdx].length >= MAX_STACK);
                state[cupIdx].push({ id: i, color: `hsl(${Math.random()*360}, 70%, 50%)` });
            }
            return state;
        }

        function startNewLevel() {
            isExecuting = false;
            program = [];
            clearProgram();

            let numBlocks = currentDifficulty === 'easy' ? 1 : (currentDifficulty === 'medium' ? 2 : 3);

            cups = generateRandomState(numBlocks);
            targetCups = generateRandomState(numBlocks);

            // Ensure they are different
            while (JSON.stringify(cups) === JSON.stringify(targetCups)) {
                targetCups = generateRandomState(numBlocks);
            }

            initialCupsState = JSON.parse(JSON.stringify(cups));
            craneState = { pos: 0, height: 0, holding: null };

            feedbackMsg.textContent = '';
            feedbackMsg.className = 'feedback';

            renderAll();
        }

        function resetToInitial() {
            cups = JSON.parse(JSON.stringify(initialCupsState));
            craneState = { pos: 0, height: 0, holding: null };
            renderAll();
        }

        function renderAll() {
            renderBoard(targetCups, targetBoardEl, true);
            renderBoard(cups, mainBoardEl, false);
            updateCraneVisuals();
            lucide.createIcons();
        }

        function renderBoard(boardState, container, isTarget) {
            container.innerHTML = '';
            for(let i=0; i<NUM_CUPS; i++) {
                let cupEl = document.createElement('div');
                cupEl.className = 'cup';
                if (!isTarget) cupEl.id = `cup-${i}`;

                // Render from bottom to top, flex column-reverse handles this naturally
                for(let j=0; j<boardState[i].length; j++) {
                    let block = boardState[i][j];
                    let blockEl = document.createElement('div');
                    blockEl.className = 'cube';
                    // blockEl.style.background = block.color; // Using default blue for simplicity now
                    cupEl.appendChild(blockEl);
                }
                container.appendChild(cupEl);
            }
        }

        function updateCraneVisuals() {
            const cupWidth = 60;
            const gap = 15;
            const baseX = craneState.pos * (cupWidth + gap);

            craneEl.style.left = `${baseX}px`;

            // Height visual mapping
            const baseArmHeight = 40;
            const dropPerLevel = 50;
            craneArmEl.style.height = `${baseArmHeight + (craneState.height * dropPerLevel)}px`;

            if (craneState.holding) {
                craneEl.classList.add('holding');
            } else {
                craneEl.classList.remove('holding');
            }
        }

        function addInstruction(type) {
            if (isExecuting) return;
            program.push(type);
            renderProgram();
            playSound('click');
        }

        function deleteLastInstruction() {
            if (isExecuting || program.length === 0) return;
            program.pop();
            renderProgram();
            playSound('click');
        }

        function clearProgram() {
            if (isExecuting) return;
            program = [];
            renderProgram();
        }

        function renderProgram() {
            programStrip.innerHTML = '';
            program.forEach((inst, idx) => {
                let stepEl = document.createElement('div');
                stepEl.className = 'prog-step';
                stepEl.id = `prog-step-${idx}`;

                let icon = '';
                if(inst === 'up') icon = 'arrow-up';
                else if(inst === 'down') icon = 'arrow-down';
                else if(inst === 'left') icon = 'arrow-left';
                else if(inst === 'right') icon = 'arrow-right';
                else if(inst === 'action') icon = 'grip-horizontal';

                stepEl.innerHTML = `<i data-lucide="${icon}"></i>`;
                programStrip.appendChild(stepEl);
            });
            lucide.createIcons();
            playBtn.disabled = program.length === 0;
        }

        const delay = ms => new Promise(res => setTimeout(res, ms));

        async function executeProgram() {
            if (isExecuting || program.length === 0) return;
            isExecuting = true;
            playBtn.disabled = true;
            resetToInitial(); // Reset before run

            feedbackMsg.textContent = 'Exécution...';
            feedbackMsg.className = 'feedback';

            for(let i=0; i<program.length; i++) {
                document.querySelectorAll('.prog-step').forEach(el => el.classList.remove('active'));
                let currentStepEl = document.getElementById(`prog-step-${i}`);
                if(currentStepEl) currentStepEl.classList.add('active');

                let inst = program[i];
                let success = processInstruction(inst);

                renderAll();

                if (!success) {
                    playSound('error');
                    showFeedback('Erreur : Mouvement impossible !', 'error');
                    isExecuting = false;
                    playBtn.disabled = false;
                    document.querySelectorAll('.prog-step').forEach(el => el.classList.remove('active'));
                    return;
                }

                playSound('click');
                await delay(600);
            }

            document.querySelectorAll('.prog-step').forEach(el => el.classList.remove('active'));
            checkWin();
        }

        function processInstruction(inst) {
            if (inst === 'left') {
                if (craneState.pos > 0) {
                    craneState.pos--;
                    return true;
                }
                return false;
            } else if (inst === 'right') {
                if (craneState.pos < NUM_CUPS - 1) {
                    craneState.pos++;
                    return true;
                }
                return false;
            } else if (inst === 'down') {
                if (craneState.height < MAX_STACK) {
                    craneState.height++;
                    return true;
                }
                return false;
            } else if (inst === 'up') {
                if (craneState.height > 0) {
                    craneState.height--;
                    return true;
                }
                return false;
            } else if (inst === 'action') {
                let currentStack = cups[craneState.pos];
                // Distance from top of cup
                let blocksInCup = currentStack.length;
                let requiredHeightForAction = MAX_STACK - blocksInCup; // 0 height is top, 3 height is bottom

                if (craneState.holding) {
                    // Try to drop
                    if (blocksInCup < MAX_STACK) { // Needs to be exactly above the top block
                        // In a real precise model, height would need to match. For simplicity and kids,
                        // if they are at or above the drop zone, let it drop, but to teach precision, let's enforce height match
                        if (craneState.height === requiredHeightForAction) {
                            currentStack.push(craneState.holding);
                            craneState.holding = null;
                            return true;
                        }
                    }
                    return false;
                } else {
                    // Try to grab
                    if (blocksInCup > 0) {
                        let requiredHeightForGrab = MAX_STACK - blocksInCup;
                        if (craneState.height === requiredHeightForGrab) {
                            craneState.holding = currentStack.pop();
                            return true;
                        }
                    }
                    return false;
                }
            }
            return false;
        }

        function checkWin() {
            let isWin = JSON.stringify(cups) === JSON.stringify(targetCups) && !craneState.holding;

            if (isWin) {
                updateScore(true);
                showFeedback('Bien joué !', 'success');
                playSound('win');
                launchConfetti();
                setTimeout(() => {
                    startNewLevel();
                }, 2500);
            } else {
                updateScore(false);
                playSound('error');
                showFeedback('Ce nest pas la bonne disposition.', 'error');
                isExecuting = false;
                playBtn.disabled = false;
            }
        }

        function showFeedback(msg, type) {
            feedbackMsg.textContent = msg;
            feedbackMsg.className = `feedback ${type}`;
            if(type === 'error') {
                setTimeout(() => {
                    feedbackMsg.textContent = '';
                    feedbackMsg.className = 'feedback';
                }, 3000);
            }
        }

        function updateScore(correct) {
            if (correct) {
                globalCorrect++;
                globalStreak++;
                if (globalStreak > globalBest) globalBest = globalStreak;
            } else {
                globalStreak = 0;
            }
            document.getElementById('global-correct').textContent = globalCorrect;
            document.getElementById('global-streak').textContent = globalStreak;
            document.getElementById('global-best').textContent = globalBest;

            ScoreManager.updateScore(globalCorrect, globalStreak, globalBest);
        }

        window.addEventListener('load', init);
    </script>
    <script src="../../js/theme.js"></script>
    <script src="../../js/swipe.js"></script>
</body>
