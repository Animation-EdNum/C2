<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>🏗️ Jeu de la grue</title>
    <meta property="og:title" content="Jeu de la grue">
    <meta property="og:description" content="Déplace la grue pour attraper et déplacer des objets.">
    <link rel="icon" href="../../favicon.svg" type="image/svg+xml">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/shared.css">
    <style>
        body > header, body > .container {
            animation: fadeInCascade 0.6s var(--spring-easing) forwards;
        }

        :root {
            --bg-gradient-start: #f6d365; --bg-gradient-end: #fda085;
            --card-bg: rgba(249, 250, 252, 0.85); --card-border: #fef08a; --container-bg: rgba(255, 255, 255, 0.85);
            --text-main: #333; --text-secondary: #666; --text-muted: #777;
            --accent: #f59e0b; --accent-dark: #d97706;
            --badge-bg: #fef3c7; --badge-color: #b45309;
            --input-border: #fde68a; --instructions-bg: #fffbeb;
            --success: #166534; --error: #b91c1c;
            --shadow-color: rgba(0, 0, 0, 0.3); --card-shadow: rgba(245, 158, 11, 0.15);
        }

        body.dark {
            --bg-gradient-start: #422006; --bg-gradient-end: #78350f;
            --card-bg: rgba(30, 41, 59, 0.75); --card-border: #78350f; --container-bg: rgba(15, 23, 42, 0.75);
            --text-main: #f8fafc; --text-secondary: #94a3b8; --text-muted: #64748b;
            --accent: #f59e0b; --accent-dark: #d97706;
            --badge-bg: #78350f; --badge-color: #fcd34d;
            --input-border: #78350f; --instructions-bg: #451a03;
            --success: #34d399; --error: #f87171;
            --shadow-color: rgba(0, 0, 0, 0.5); --card-shadow: rgba(0, 0, 0, 0.4);
        }

        body.dark .icon-action-btn { background: rgba(0, 0, 0, 0.4); border-color: rgba(255,255,255,0.1); }
        body.dark .cell { border-color: #475569; background: rgba(30, 41, 59, 0.8); }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            touch-action: manipulation;
            font-family: 'Outfit', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh; padding: 20px; color: var(--text-main);
        }

        .container {
            max-width: 800px; margin: 0 auto; background: var(--container-bg);
            padding: 30px; border-radius: 15px; box-shadow: 0 20px 60px var(--shadow-color);
            backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: var(--glass-border);
        }

        h1 { text-align: center; color: var(--accent); margin-bottom: 5px; font-size: 28px; }
        .subtitle { text-align: center; color: var(--text-secondary); margin-bottom: 20px; font-size: 14px; }

        /* ========== TABS ========== */
        .tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn {
            padding: 8px 20px; border-radius: 20px; border: 2px solid var(--accent);
            background: transparent; color: var(--accent); font-size: 14px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; outline: none;
            min-width: 44px; min-height: 44px;
        }
        .tab-btn.active { background: var(--accent); color: #fff; }
        .tab-btn:hover:not(.active) { background: #fef3c7; }
        body.dark .tab-btn:hover:not(.active) { background: var(--card-bg); }

        /* ========== DIFFICULTÉ ========== */
        .difficulty-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 25px; flex-wrap: wrap; }
        .diff-btn {
            padding: 6px 16px; border-radius: 20px; border: 2px solid var(--accent);
            background: transparent; color: var(--accent); font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; outline: none;
            min-width: 44px; min-height: 44px;
        }
        .diff-btn.active { background: var(--accent); color: #fff; }
        .diff-btn:hover:not(.active) { background: #fef3c7; }
        body.dark .diff-btn:hover:not(.active) { background: var(--card-bg); }

        /* ========== GAME AREA ========== */
        .game-area {
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            margin-bottom: 30px;
        }

        .grid-container {
            display: inline-block;
            background: #e2e8f0;
            padding: 4px;
            border-radius: 8px;
        }
        body.dark .grid-container { background: #334155; }

        .grid {
            display: grid;
            gap: 2px;
        }

        .cell {
            width: 50px;
            height: 50px;
            background: #fff;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        @media (max-width: 600px) {
            .cell {
                width: 40px; height: 40px;
            }
        }

        .crane-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .crane-icon {
            width: 80%;
            height: 80%;
            color: var(--accent);
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .target-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(34, 197, 94, 0.2);
            border: 2px dashed #22c55e;
            border-radius: 4px;
        }

        .object-icon {
            width: 70%;
            height: 70%;
            color: #ef4444;
            fill: #ef4444;
        }

        .crane-holding {
            color: #ef4444;
        }

        /* ========== CONTROLS ========== */
        .controls-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 10px;
        }

        .dpad {
            display: grid;
            grid-template-columns: 50px 50px 50px;
            grid-template-rows: 50px 50px 50px;
            gap: 5px;
        }

        .dpad-btn {
            background: var(--card-bg);
            border: 2px solid var(--card-border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-main);
            transition: all 0.1s;
        }

        .dpad-btn:hover { background: #e2e8f0; }
        body.dark .dpad-btn:hover { background: #475569; }
        .dpad-btn:active { transform: scale(0.95); }

        .dpad-up { grid-column: 2; grid-row: 1; }
        .dpad-left { grid-column: 1; grid-row: 2; }
        .dpad-right { grid-column: 3; grid-row: 2; }
        .dpad-down { grid-column: 2; grid-row: 3; }
        .dpad-action {
            grid-column: 2; grid-row: 2;
            background: var(--accent);
            border-color: var(--accent-dark);
            color: white;
            border-radius: 50%;
        }
        .dpad-action:hover { background: var(--accent-dark); }
        .dpad-action svg { color: white; }

        .action-btn-large {
            padding: 12px 24px;
            border-radius: 24px;
            background: var(--accent);
            color: white;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.1s;
            outline: none;
            min-width: 44px;
            min-height: 44px;
        }
        .action-btn-large:hover { background: var(--accent-dark); }
        .action-btn-large:active { transform: scale(0.95); }

        /* ========== FEEDBACK & SCORE ========== */
        .feedback { font-size: 16px; font-weight: 600; text-align: center; height: 24px; margin-bottom: 10px; transition: color 0.3s; }
        .feedback.success { color: var(--success); }
        .feedback.error { color: var(--error); }

        .score-bar { display: flex; justify-content: center; gap: 24px; margin-top: 25px; padding-top: 20px; border-top: 1px solid var(--card-border); flex-wrap: wrap; }
        .score-item { text-align: center; }
        .score-item .score-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; }
        .score-item .score-value { font-size: 22px; font-weight: 700; color: var(--accent); font-family: monospace; }

        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }

        @media print { .no-print { display: none !important; } }
    </style>
    <script src="../../js/scores.js"></script>
    <script src="../../js/audio.js"></script>
    <script src="../../js/lucide.min.js"></script>
</head>
<body>

                            <svg id="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>

                            <span id="audioToggleText">Activer le son</span>

                    </div>
                </div>

        </header>

        <p class="subtitle">Déplace la grue pour attraper et déplacer des objets !</p>

        <!-- TABS -->
        <div class="tabs">
            <button class="tab-btn active" id="tab-collect">🎯 Collecte</button>
            <button class="tab-btn" id="tab-deliver">🚚 Livraison</button>
        </div>

        <!-- DIFFICULTÉ -->
        <div class="difficulty-bar">
            <button class="diff-btn" id="diff-easy">🟢 Facile</button>
            <button class="diff-btn active" id="diff-medium">🟡 Moyen</button>
            <button class="diff-btn" id="diff-hard">🔴 Difficile</button>
        </div>

        <div class="feedback" id="feedback-msg"></div>

        <!-- GAME AREA -->
        <div class="game-area">
            <div class="grid-container">
                <div class="grid" id="grid">
                    <!-- Grille générée ici -->
                </div>
            </div>

            <!-- CONTROLS -->
            <div class="controls-panel">
                <div class="dpad">
                    <button class="dpad-btn dpad-up" aria-label="Haut" onclick="moveCrane(0, -1)"><i data-lucide="arrow-up"></i></button>
                    <button class="dpad-btn dpad-left" aria-label="Gauche" onclick="moveCrane(-1, 0)"><i data-lucide="arrow-left"></i></button>
                    <button class="dpad-btn dpad-action" aria-label="Action" onclick="actionCrane()"><i data-lucide="check"></i></button>
                    <button class="dpad-btn dpad-right" aria-label="Droite" onclick="moveCrane(1, 0)"><i data-lucide="arrow-right"></i></button>
                    <button class="dpad-btn dpad-down" aria-label="Bas" onclick="moveCrane(0, 1)"><i data-lucide="arrow-down"></i></button>

            </div>

                <div class="score-label">Record</div>

    <script src="../../js/confetti.js"></script>
    <script>
        let currentMode = 'collect'; // 'collect' ou 'deliver'
        let currentDifficulty = 'medium'; // 'easy', 'medium', 'hard'

        let globalCorrect = 0;
        let globalStreak = 0;
        let globalBest = 0;

        let gridCols = 5;
        let gridRows = 5;
        let crane = { x: 2, y: 0, holding: false };

        let objects = [];
        let targets = [];

        const feedbackMsg = document.getElementById('feedback-msg');
        const gridEl = document.getElementById('grid');
        const actionTextEl = document.getElementById('action-text');

        function init() {
            setupEventListeners();
            startNewLevel();
            ScoreManager.init('jeu_de_la_grue');
        }

        function setupEventListeners() {
            document.getElementById('tab-collect').addEventListener('click', () => setMode('collect'));
            document.getElementById('tab-deliver').addEventListener('click', () => setMode('deliver'));

            document.getElementById('diff-easy').addEventListener('click', () => setDifficulty('easy'));
            document.getElementById('diff-medium').addEventListener('click', () => setDifficulty('medium'));
            document.getElementById('diff-hard').addEventListener('click', () => setDifficulty('hard'));

            window.addEventListener('keydown', (e) => {
                if (e.repeat) return;

                // Allow keyboard control only if no modal or input is focused
                if (document.activeElement && document.activeElement.tagName === 'INPUT') return;

                switch(e.key) {
                    case 'ArrowUp': e.preventDefault(); moveCrane(0, -1); break;
                    case 'ArrowDown': e.preventDefault(); moveCrane(0, 1); break;
                    case 'ArrowLeft': e.preventDefault(); moveCrane(-1, 0); break;
                    case 'ArrowRight': e.preventDefault(); moveCrane(1, 0); break;
                    case 'Enter':
                    case ' ':
                        e.preventDefault(); actionCrane(); break;
                }
            });

            window.addEventListener('c2_change_difficulty', (e) => {
                const nextDiff = e.detail.difficulty;
                if (nextDiff === '4') document.getElementById('diff-easy')?.click();
                else if (nextDiff === '6') document.getElementById('diff-medium')?.click();
                else if (nextDiff === '8') document.getElementById('diff-hard')?.click();
            });
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('tab-collect').classList.toggle('active', mode === 'collect');
            document.getElementById('tab-deliver').classList.toggle('active', mode === 'deliver');
            startNewLevel();
        }

        function setDifficulty(diff) {
            currentDifficulty = diff;
            document.querySelectorAll('.diff-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`diff-${diff}`).classList.add('active');
            startNewLevel();
        }

        function startNewLevel() {
            if (currentDifficulty === 'easy') { gridCols = 4; gridRows = 4; }
            else if (currentDifficulty === 'medium') { gridCols = 5; gridRows = 5; }
            else if (currentDifficulty === 'hard') { gridCols = 6; gridRows = 6; }

            crane = { x: Math.floor(gridCols / 2), y: 0, holding: false };
            objects = [];
            targets = [];
            feedbackMsg.textContent = '';
            feedbackMsg.className = 'feedback';

            let numObjects = currentDifficulty === 'easy' ? 1 : (currentDifficulty === 'medium' ? 2 : 3);

            let cells = [];
            for(let i=0; i<gridCols; i++) {
                for(let j=1; j<gridRows; j++) {
                    cells.push({x: i, y: j});
                }
            }
            cells.sort(() => Math.random() - 0.5);

            for(let i=0; i<numObjects; i++) {
                let cell = cells.pop();
                objects.push({ id: i, x: cell.x, y: cell.y, delivered: false });
            }

            if (currentMode === 'deliver') {
                for(let i=0; i<numObjects; i++) {
                    let cell = cells.pop();
                    targets.push({ id: i, x: cell.x, y: cell.y });
                }
            }

            renderGrid();
        }

        function renderGrid() {
            gridEl.style.gridTemplateColumns = `repeat(${gridCols}, 1fr)`;
            gridEl.innerHTML = '';

            for(let y=0; y<gridRows; y++) {
                for(let x=0; x<gridCols; x++) {
                    let cellEl = document.createElement('div');
                    cellEl.className = 'cell';

                    let isTarget = targets.some(t => t.x === x && t.y === y);
                    if (isTarget) {
                        let targetEl = document.createElement('div');
                        targetEl.className = 'target-overlay';
                        cellEl.appendChild(targetEl);
                    }

                    let obj = objects.find(o => o.x === x && o.y === y && !o.delivered);
                    if (obj && !(crane.x === x && crane.y === y && crane.holding === obj.id)) {
                        let objEl = document.createElement('i');
                        objEl.setAttribute('data-lucide', 'package');
                        objEl.className = 'object-icon';
                        cellEl.appendChild(objEl);
                    }

                    if (crane.x === x && crane.y === y) {
                        let craneEl = document.createElement('div');
                        craneEl.className = 'crane-overlay';
                        if (crane.holding !== false) {
                            craneEl.innerHTML = `<i data-lucide="crosshair" class="crane-icon crane-holding"></i>`;
                        } else {
                            craneEl.innerHTML = `<i data-lucide="crosshair" class="crane-icon"></i>`;
                        }
                        cellEl.appendChild(craneEl);
                    }

                    gridEl.appendChild(cellEl);
                }
            }

            if (crane.holding !== false) {
                actionTextEl.textContent = 'Déposer';
            } else {
                actionTextEl.textContent = 'Attraper';
            }

            lucide.createIcons();
        }

        function moveCrane(dx, dy) {
            let nx = crane.x + dx;
            let ny = crane.y + dy;
            if (nx >= 0 && nx < gridCols && ny >= 0 && ny < gridRows) {
                crane.x = nx;
                crane.y = ny;
                if (crane.holding !== false) {
                    let obj = objects.find(o => o.id === crane.holding);
                    if (obj) {
                        obj.x = nx;
                        obj.y = ny;
                    }
                }
                renderGrid();
                playSound('click');
            }
        }

        function actionCrane() {
            if (crane.holding !== false) {
                // Drop
                if (currentMode === 'collect') {
                    // Collect mode shouldn't hold, but just in case
                } else if (currentMode === 'deliver') {
                    let targetIdx = targets.findIndex(t => t.x === crane.x && t.y === crane.y);
                    if (targetIdx !== -1) {
                        // Drop on target
                        let obj = objects.find(o => o.id === crane.holding);
                        obj.delivered = true;
                        crane.holding = false;
                        targets.splice(targetIdx, 1);
                        playSound('success');
                        showFeedback('Bien joué !', 'success');
                        renderGrid();
                        checkWin();
                    } else {
                        // Drop on empty?
                        let otherObj = objects.find(o => o.x === crane.x && o.y === crane.y && o.id !== crane.holding && !o.delivered);
                        if (otherObj) {
                            playSound('error');
                            showFeedback('Case occupée !', 'error');
                        } else {
                            crane.holding = false;
                            playSound('click');
                            renderGrid();
                        }
                    }
                }
            } else {
                // Pick up
                let obj = objects.find(o => o.x === crane.x && o.y === crane.y && !o.delivered);
                if (obj) {
                    if (currentMode === 'collect') {
                        obj.delivered = true;
                        playSound('success');
                        showFeedback('Objet collecté !', 'success');
                        renderGrid();
                        checkWin();
                    } else {
                        crane.holding = obj.id;
                        playSound('click');
                        renderGrid();
                    }
                } else {
                    playSound('error');
                }
            }
        }

        function checkWin() {
            if (objects.every(o => o.delivered)) {
                updateScore(true);
                setTimeout(() => {
                    launchConfetti();
                    playSound('win');
                    startNewLevel();
                }, 1000);
            }
        }

        function showFeedback(msg, type) {
            feedbackMsg.textContent = msg;
            feedbackMsg.className = `feedback ${type}`;
            setTimeout(() => {
                feedbackMsg.textContent = '';
                feedbackMsg.className = 'feedback';
            }, 2000);
        }

        function updateScore(correct) {
            if (correct) {
                globalCorrect++;
                globalStreak++;
                if (globalStreak > globalBest) globalBest = globalStreak;
            } else {
                globalStreak = 0;
            }
            document.getElementById('global-correct').textContent = globalCorrect;
            document.getElementById('global-streak').textContent = globalStreak;
            document.getElementById('global-best').textContent = globalBest;

            ScoreManager.updateScore(globalCorrect, globalStreak, globalBest);
        }

        window.addEventListener('load', init);
    </script>
    <script src="../../js/theme.js"></script>
    <script src="../../js/swipe.js"></script>
</body>
</html>
